    // Guard: render nothing if scene hasn't been entered yet (or was exited)
    if (!this.brickField || !this.paddle) return;

    r.drawBricks(this.brickField);
    r.drawPaddle(this.paddle);
    r.drawBalls(this.balls);
    r.drawPowerUps(this.powerUpDrops);
    r.drawParticles(this.particles);
    r.drawComboTexts(this.scoreSystem.comboTexts);
    r.drawHUD(
      this.scoreSystem.score,
      this.lives,
      this.level.name,
      this.activePowerUps,
    );

    // Show launch hint when waiting for first tap (with pulse animation)
    if (!this._launched) {
      r.drawPulseSubtitle('\u70b9\u51fb\u53d1\u5c04', C.SCREEN_H - 120, 16);
    }
  }

  // ---- Input ----

  onTap(x, y) {
    // Tap on HUD area → pause
    if (y < C.PLAY_TOP) {
      this._game.stateMachine.transition('PAUSED');
      return;
    }

    // First tap launches the ball
    if (!this._launched) {
      this._launched = true;
      for (const ball of this.balls) {
        ball.speed = this.level.ballSpeed || C.BALL_SPEED;
        ball.launch();
      }
    }
  }

  onMove(x, _y) {
    if (this.paddle) this.paddle.moveTo(x, C.SCREEN_W);
  }
}


// src/scenes/paused-scene.js
// Provides: PausedScene
// Depends: C, STATES, getPresetLevel, Renderer

class PausedScene {
  constructor(game) {
    this._game = game;
    this._buttons = [];
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._enterTime = 0;
  }

  enter() {
    const cx = C.SCREEN_W / 2;
    this._buttons = [
      { x: cx - 110, y: 270, w: 220, h: 48, text: '\u7ee7\u7eed\u6e38\u620f',    action: 'resume',      delay: 0 },
      { x: cx - 110, y: 330, w: 220, h: 48, text: '\u91cd\u65b0\u5f00\u59cb',   action: 'restart',     delay: 0.06 },
      { x: cx - 110, y: 390, w: 220, h: 48, text: '\u9009\u62e9\u5173\u5361',   action: 'levelSelect', delay: 0.12 },
      { x: cx - 110, y: 450, w: 220, h: 48, text: '\u8fd4\u56de\u4e3b\u83dc\u5355', action: 'menu',    delay: 0.18 },
    ];
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._enterTime = 0;
  }

  exit() {}

  update(dt) {
    this._enterTime += dt;
    if (this._pressTimer > 0) {
      this._pressTimer -= dt;
      if (this._pressTimer <= 0) this._pressedBtn = null;
    }
  }

  render() {
    // Draw frozen game underneath
    const gameScene = this._game.stateMachine._scenes[STATES.PLAYING];
    if (gameScene && gameScene.brickField) gameScene.render();

    const r = this._game.renderer;
    const ctx = r.ctx;

    // Overlay with blur effect (simulated with multiple transparent layers)
    r.drawOverlay(0.8);

    // Title with glow
    const titleAlpha = Math.min(1, this._enterTime / 0.3);
    ctx.globalAlpha = titleAlpha;
    r.drawTitle('\u6682\u505c', 210, 30);
    r.drawOrnament(235, 120);
    ctx.globalAlpha = 1;

    // Buttons with staggered entrance
    for (const btn of this._buttons) {
      const btnAge = this._enterTime - (btn.delay || 0);
      if (btnAge < 0) continue;

      const progress = Math.min(1, btnAge / 0.2);
      const ease = 1 - Math.pow(1 - progress, 3);
      const offsetX = (1 - ease) * 40;

      ctx.globalAlpha = ease;
      const isPressed = this._pressedBtn === btn;
      r.drawButton(btn.x + offsetX, btn.y, btn.w, btn.h, btn.text, { highlighted: isPressed });
    }
    ctx.globalAlpha = 1;
  }

  onTap(x, y) {
    for (const btn of this._buttons) {
      if (x >= btn.x && x <= btn.x + btn.w &&
          y >= btn.y && y <= btn.y + btn.h) {
        this._pressedBtn = btn;
        this._pressTimer = 0.12;

        switch (btn.action) {
          case 'resume':
            this._game.stateMachine.transition('PLAYING');
            break;
          case 'restart': {
            const gameScene = this._game.stateMachine._scenes[STATES.PLAYING];
            this._game.stateMachine.transition('PLAYING');
            if (gameScene) {
              const idx = gameScene.levelIndex;
              const lvl = idx >= 0 ? getPresetLevel(idx) : gameScene.level;
              gameScene.exit(false);
              gameScene.enter({ level: lvl, levelIndex: idx });
            }
            break;
          }
          case 'levelSelect':
            this._game.stateMachine.transition('LEVEL_SELECT');
            break;
          case 'menu':
            this._game.stateMachine.transition('MENU');
            break;
        }
      }
    }
  }

  onMove() {}
}


// src/scenes/result-scene.js
// Provides: ResultScene
// Depends: C, Theme, getPresetLevel, audio

class ResultScene {
  constructor(game, type) {
    this._game = game;
    this._type = type;
    this._data = null;
    this._buttons = [];
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._enterTime = 0;
    this._particles = []; // celebration particles for win
  }

  enter(data) {
    this._data = data || {};
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._enterTime = 0;
    this._particles = [];
    const cx = C.SCREEN_W / 2;

    if (typeof audio !== 'undefined') {
      if (this._type === 'WIN') audio.playWin();
      else audio.playGameOver();
    }

    const idx = this._data.levelIndex != null ? this._data.levelIndex : 0;

    // Spawn celebration particles for win
    if (this._type === 'WIN') {
      const colors = [Theme.accent, Theme.accent2, '#fff', '#ffdd88', '#9070c0'];
      for (let i = 0; i < 40; i++) {
        this._particles.push({
          x: C.SCREEN_W / 2 + (Math.random() - 0.5) * 200,
          y: 160 + (Math.random() - 0.5) * 60,
          vx: (Math.random() - 0.5) * 150,
          vy: -80 - Math.random() * 120,
          size: 2 + Math.random() * 3,
          life: 1.5 + Math.random() * 1,
          maxLife: 2.5,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 8,
        });
      }
    }

    if (this._type === 'WIN') {
      if (idx >= 0) {
        const nextIdx = idx + 1;
        if (nextIdx + 1 > (this._game.unlockedLevels || 1)) {
          this._game.unlockedLevels = nextIdx + 1;
        }
      }

      if (idx < 0) {
        this._buttons = [
          { x: cx - 110, y: 380, w: 220, h: 50, text: '\u518d\u73a9\u4e00\u6b21', action: 'retry',  delay: 0.3 },
          { x: cx - 110, y: 445, w: 220, h: 50, text: '\u4e3b\u83dc\u5355',       action: 'menu',   delay: 0.38 },
        ];
      } else {
        this._buttons = [
          { x: cx - 110, y: 380, w: 220, h: 50, text: '\u4e0b\u4e00\u5173',     action: 'next',        delay: 0.3 },
          { x: cx - 110, y: 445, w: 220, h: 50, text: '\u9009\u62e9\u5173\u5361', action: 'levelSelect', delay: 0.38 },
          { x: cx - 110, y: 510, w: 220, h: 50, text: '\u4e3b\u83dc\u5355',       action: 'menu',        delay: 0.46 },
        ];
      }
    } else {
      if (idx < 0) {
        this._buttons = [
          { x: cx - 110, y: 380, w: 220, h: 50, text: '\u91cd\u8bd5',   action: 'retry', delay: 0.3 },
          { x: cx - 110, y: 445, w: 220, h: 50, text: '\u4e3b\u83dc\u5355', action: 'menu', delay: 0.38 },
        ];
      } else {
        this._buttons = [
          { x: cx - 110, y: 380, w: 220, h: 50, text: '\u91cd\u8bd5',     action: 'retry',       delay: 0.3 },
          { x: cx - 110, y: 445, w: 220, h: 50, text: '\u9009\u62e9\u5173\u5361', action: 'levelSelect', delay: 0.38 },
          { x: cx - 110, y: 510, w: 220, h: 50, text: '\u4e3b\u83dc\u5355',       action: 'menu',        delay: 0.46 },
        ];
      }
    }
  }

  exit() {}

  update(dt) {
    this._enterTime += dt;

    if (this._pressTimer > 0) {
      this._pressTimer -= dt;
      if (this._pressTimer <= 0) this._pressedBtn = null;
    }

    // Update celebration particles
    for (const p of this._particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 120 * dt; // gravity
      p.life -= dt;
      p.rotation += p.rotSpeed * dt;
    }
    this._particles = this._particles.filter(p => p.life > 0);
  }

  render() {
    const r   = this._game.renderer;
    const ctx = r.ctx;

    r.drawBackground();

    // Celebration particles (behind text)
    for (const p of this._particles) {
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    }
    ctx.globalAlpha = 1;

    // Title entrance animation
    const titleProgress = Math.min(1, this._enterTime / 0.4);
    const titleScale = 0.8 + titleProgress * 0.2;
    ctx.globalAlpha = titleProgress;

    if (this._type === 'WIN') {
      r.drawTitle('\u606d\u559c\u901a\u5173\uff01', 190, 28);
    } else {
      r.drawTitle('\u6e38\u620f\u7ed3\u675f', 190, 28);
    }

    r.drawOrnament(215, 160);
    ctx.globalAlpha = 1;

    // Score display with count-up effect
    const scoreProgress = Math.min(1, (this._enterTime - 0.2) / 0.6);
    if (scoreProgress > 0) {
      const displayScore = Math.floor((this._data.score || 0) * Math.min(1, scoreProgress));
      ctx.textAlign = 'center';

      // Score label
      ctx.font = '11px "Avenir Next", "Segoe UI", sans-serif';
      ctx.fillStyle = Theme.textSecondary;
      ctx.fillText('SCORE', C.SCREEN_W / 2, 255);

      // Score value
      ctx.font = 'bold 32px "Avenir Next", "Georgia", serif';
      ctx.fillStyle = Theme.accent;
      ctx.shadowColor = Theme.accent;
      ctx.shadowBlur = 10;
      ctx.fillText(displayScore, C.SCREEN_W / 2, 290);
      ctx.shadowBlur = 0;

      // Level name
      ctx.font = '12px "Avenir Next", "Segoe UI", sans-serif';
      ctx.fillStyle = Theme.textSecondary;
      ctx.fillText(this._data.level?.name || '', C.SCREEN_W / 2, 325);
    }

    // Buttons with staggered entrance
    for (const btn of this._buttons) {
      const btnAge = this._enterTime - (btn.delay || 0);
      if (btnAge < 0) continue;

      const progress = Math.min(1, btnAge / 0.25);
      const ease = 1 - Math.pow(1 - progress, 3);
      const offsetY = (1 - ease) * 20;

      ctx.globalAlpha = ease;
      const isPressed = this._pressedBtn === btn;
      r.drawButton(btn.x, btn.y + offsetY, btn.w, btn.h, btn.text, { highlighted: isPressed });
    }
    ctx.globalAlpha = 1;
  }

  onTap(x, y) {
    for (const btn of this._buttons) {
      if (x >= btn.x && x <= btn.x + btn.w &&
          y >= btn.y && y <= btn.y + btn.h) {
        this._pressedBtn = btn;
        this._pressTimer = 0.12;

        switch (btn.action) {
          case 'next': {
            const nextIdx   = (this._data.levelIndex || 0) + 1;
            const nextLevel = getPresetLevel(nextIdx);
            if (nextLevel) {
              this._game.stateMachine.transition('PLAYING', {
                level: nextLevel,
                levelIndex: nextIdx,
              });
            } else {
              this._game.stateMachine.transition('LEVEL_SELECT');
            }
            break;
          }
          case 'retry': {
            const idx = this._data.levelIndex;
            const lvl = idx >= 0 ? getPresetLevel(idx) : this._data.level;
            if (lvl) {
              this._game.stateMachine.transition('PLAYING', {
                level: lvl,
                levelIndex: idx,
              });
            } else {
              this._game.stateMachine.transition('MENU');
            }
            break;
          }
          case 'levelSelect':
            this._game.stateMachine.transition('LEVEL_SELECT');
            break;
          case 'menu':
            this._game.stateMachine.transition('MENU');
            break;
        }
      }
    }
  }

  onMove() {}
}


// src/scenes/image-upload.js
// Provides: ImageUploadScene
// Depends: C, Theme, BrickMapper

class ImageUploadScene {

  constructor(game) {
    this._game = game;
    this._buttons = [];
    this._imageData = null;
    this._previewLevel = null;
    this._status = 'idle';
    this._statusText = '\u9009\u62e9\u4e00\u5f20\u56fe\u7247\u6765\u751f\u6210\u50cf\u7d20\u5173\u5361';
    this._fileInput = null;
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._processingDots = 0;
    this._processingTimer = 0;
    this._enterTime = 0;
  }

  enter() {
    this._imageData = null;
    this._previewLevel = null;
    this._status = 'idle';
    this._statusText = '\u9009\u62e9\u4e00\u5f20\u56fe\u7247\u6765\u751f\u6210\u50cf\u7d20\u5173\u5361';
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._processingDots = 0;
    this._processingTimer = 0;
    this._enterTime = 0;
    this._buildButtons();
    this._ensureFileInput();
  }

  exit() {}

  _buildButtons() {
    const cx = C.SCREEN_W / 2;
    if (this._status === 'ready') {
      this._buttons = [
        { x: cx - 110, y: 250, w: 220, h: 50, text: '\u6362\u4e00\u5f20',   action: 'pick' },
        { x: cx - 110, y: 440, w: 220, h: 50, text: '\u5f00\u59cb\u6e38\u620f', action: 'play' },
        { x: cx - 110, y: 510, w: 220, h: 50, text: '\u8fd4\u56de',     action: 'back' },
      ];
    } else {
      this._buttons = [
        { x: cx - 110, y: 280, w: 220, h: 50, text: '\u9009\u62e9\u56fe\u7247', action: 'pick' },
        { x: cx - 110, y: 510, w: 220, h: 50, text: '\u8fd4\u56de',     action: 'back' },
      ];
    }
  }

  _ensureFileInput() {
    if (this._fileInput) return;
    this._fileInput = document.createElement('input');
    this._fileInput.type = 'file';
    this._fileInput.accept = 'image/*';
    this._fileInput.style.display = 'none';
    document.body.appendChild(this._fileInput);
    this._fileInput.addEventListener('change', (e) => this._handleFile(e));
  }

  _handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    this._status = 'processing';
    this._statusText = '\u6b63\u5728\u5904\u7406\u56fe\u7247';
    this._processingDots = 0;
    this._processingTimer = 0;

    const reader = new FileReader();
    reader.onload = (evt) => {
      const img = new Image();
      img.onload = () => {
        const gridW = 56, gridH = 40;
        const aspect = img.width / img.height;
        const targetAspect = gridW / gridH;
        let sw, sh, sx, sy;
        if (aspect > targetAspect) {
          sh = img.height; sw = sh * targetAspect;
          sx = (img.width - sw) / 2; sy = 0;
        } else {
          sw = img.width; sh = sw / targetAspect;
          sx = 0; sy = (img.height - sh) / 2;
        }
        const oc = document.createElement('canvas');
        oc.width = gridW * 4; oc.height = gridH * 4;
        const octx = oc.getContext('2d');
        octx.drawImage(img, sx, sy, sw, sh, 0, 0, oc.width, oc.height);
        const imageData = octx.getImageData(0, 0, oc.width, oc.height);
        this._previewLevel = BrickMapper.imageToLevel(imageData, gridW, gridH);
        this._status = 'ready';
        this._statusText = '\u5df2\u751f\u6210\u5173\u5361: ' + this._previewLevel.bricks.length + ' \u4e2a\u7816\u5757';
        this._buildButtons();
      };
      img.src = evt.target.result;
    };
    reader.readAsDataURL(file);
  }

  update(dt) {
    this._enterTime += dt;
    if (this._pressTimer > 0) {
      this._pressTimer -= dt;
      if (this._pressTimer <= 0) this._pressedBtn = null;
    }
    if (this._status === 'processing') {
      this._processingTimer += dt;
      if (this._processingTimer >= 0.4) {
        this._processingTimer = 0;
        this._processingDots = (this._processingDots + 1) % 4;
      }
    }
  }

  render() {
    const r = this._game.renderer;
    const ctx = r.ctx;

    r.drawBackground();
    r.drawTitle('\u56fe\u7247\u5173\u5361', 58, 26);
    r.drawOrnament(78, 140);

    // Status text
    ctx.textAlign = 'center';
    ctx.font = '13px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;

    if (this._status === 'processing') {
      const dots = '.'.repeat(this._processingDots);
      const alpha = Math.sin(Date.now() / 300) * 0.2 + 0.8;
      ctx.globalAlpha = alpha;
      ctx.fillText(this._statusText + dots, C.SCREEN_W / 2, 200);
      ctx.globalAlpha = 1;

      // Animated processing indicator
      this._drawLoadingSpinner(ctx, C.SCREEN_W / 2, 240);
    } else if (this._status === 'idle') {
      // Icon for upload prompt
      ctx.font = '40px sans-serif';
      ctx.fillStyle = Theme.textSecondary;
      ctx.globalAlpha = 0.4;
      ctx.fillText('\ud83d\uddbc\ufe0f', C.SCREEN_W / 2, 210);
      ctx.globalAlpha = 1;

      ctx.font = '13px "Avenir Next", "Segoe UI", sans-serif';
      ctx.fillStyle = Theme.textSecondary;
      ctx.fillText(this._statusText, C.SCREEN_W / 2, 250);
    } else {
      ctx.fillText(this._statusText, C.SCREEN_W / 2, 200);
    }

    if (this._previewLevel) {
      this._renderPreview(ctx);
    }

    for (const btn of this._buttons) {
      const isPressed = this._pressedBtn === btn;
      r.drawButton(btn.x, btn.y, btn.w, btn.h, btn.text, { highlighted: isPressed });
    }
  }

  _drawLoadingSpinner(ctx, x, y) {
    const t = Date.now() / 1000;
    ctx.save();
    ctx.translate(x, y);
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + t * 3;
      const alpha = ((i + Math.floor(t * 8)) % 8) / 8;
      ctx.globalAlpha = 0.2 + alpha * 0.6;
      ctx.fillStyle = Theme.accent;
      const dx = Math.cos(angle) * 12;
      const dy = Math.sin(angle) * 12;
      ctx.beginPath();
      ctx.arc(dx, dy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  _renderPreview(ctx) {
    const level = this._previewLevel;
    const previewW = C.SCREEN_W - 40;
    const previewH = Math.round(previewW * (level.gridHeight / level.gridWidth));
    const previewX = 20;
    const previewY = 310;

    // Label
    ctx.textAlign = 'center';
    ctx.font = '10px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText('PREVIEW', C.SCREEN_W / 2, previewY - 10);

    // Border with corner brackets
    const r = this._game.renderer;
    r.drawCornerBrackets(previewX - 2, previewY - 2, previewW + 4, previewH + 4, 8);

    // Dark background
    ctx.fillStyle = Theme.bg;
    ctx.fillRect(previewX, previewY, previewW, previewH);

    // Bricks
    const bw = previewW / level.gridWidth;
    const bh = previewH / level.gridHeight;
    for (const b of level.bricks) {
      ctx.fillStyle = b.color || Theme.accent;
      ctx.fillRect(previewX + b.col * bw + 0.5, previewY + b.row * bh + 0.5, bw - 1, bh - 1);
    }

    // Mini paddle
    const pw = 30, ph = 4;
    ctx.fillStyle = Theme.accent;
    ctx.beginPath();
    ctx.roundRect(previewX + previewW / 2 - pw / 2, previewY + previewH - ph - 3, pw, ph, 2);
    ctx.fill();
  }

  onTap(x, y) {
    for (const btn of this._buttons) {
      if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
        this._pressedBtn = btn;
        this._pressTimer = 0.12;
        switch (btn.action) {
          case 'pick':
            this._fileInput.value = '';
            this._fileInput.click();
            break;
          case 'play':
            if (this._previewLevel) {
              this._game.stateMachine.transition('PLAYING', {
                level: this._previewLevel,
                levelIndex: -1,
              });
            }
            break;
          case 'back':
            this._game.stateMachine.transition('MENU');
            break;
        }
        return;
      }
    }
  }

  onMove() {}
}


// src/scenes/creative-scene.js
// Provides: CreativeScene
// Depends: C, Theme, _applyColors, audio

const API_BASE = (location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:3001'
  : '';

class CreativeScene {

  constructor(game) {
    this._game = game;
    this._buttons = [];
    this._status = 'idle';
    this._statusText = '';
    this._promptText = '';
    this._previewLevel = null;
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._processingDots = 0;
    this._processingTimer = 0;
    this._generateStartTime = 0;
    this._textarea = null;
    this._confirmBtn = null;
    this._tagRects = [];
    this._tags = ['\u57ce\u5821', '\u5fc3\u5f62', '\u661f\u7a7a', '\u7b11\u8138', '\u8ff7\u5bab', '\u94bb\u77f3', '\u968f\u673a'];
    this._randomPool = [
      '\u57ce\u5821', '\u5fc3\u5f62', '\u661f\u7a7a', '\u7b11\u8138', '\u8ff7\u5bab', '\u94bb\u77f3',
      '\u5f69\u8679', '\u706b\u7bad', '\u5c0f\u732b', '\u673a\u5668\u4eba', '\u96ea\u82b1', '\u97f3\u7b26', '\u7687\u51a0', '\u95ea\u7535',
    ];
    this._enterTime = 0;
  }

  enter() {
    this._status = 'idle';
    this._statusText = '';
    this._promptText = '';
    this._previewLevel = null;
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._processingDots = 0;
    this._processingTimer = 0;
    this._generateStartTime = 0;
    this._tagRects = [];
    this._enterTime = 0;
    this._buildButtons();
    this._ensureDOMElements();
    this._hideDOMElements();
  }

  exit() {
    this._hideDOMElements();
  }

  _buildButtons() {
    const cx = C.SCREEN_W / 2;
    switch (this._status) {
      case 'idle':
        this._buttons = [
          { x: cx - 110, y: 440, w: 220, h: 50, text: '\u2726  \u8f93\u5165\u63cf\u8ff0', action: 'input' },
          { x: cx - 110, y: 510, w: 220, h: 50, text: '\u8fd4\u56de', action: 'back' },
        ];
        break;
      case 'inputting':
      case 'generating':
        this._buttons = [];
        break;
      case 'ready':
        this._buttons = [
          { x: cx - 110, y: 490, w: 220, h: 50, text: '\u5f00\u59cb\u6e38\u620f', action: 'play' },
          { x: cx - 110, y: 550, w: 220, h: 44, text: '\u518d\u9020\u4e00\u6b21', action: 'regenerate' },
          { x: cx - 110, y: 602, w: 106, h: 40, text: '\u4fee\u6539\u63cf\u8ff0', action: 'edit' },
          { x: cx + 4,   y: 602, w: 106, h: 40, text: '\u8fd4\u56de', action: 'back' },
        ];
        break;
      case 'error':
        this._buttons = [
          { x: cx - 110, y: 440, w: 220, h: 50, text: '\u91cd\u8bd5', action: 'retry' },
          { x: cx - 110, y: 510, w: 220, h: 50, text: '\u8fd4\u56de', action: 'back' },
        ];
        break;
    }
  }

  _ensureDOMElements() {
    if (this._textarea) return;

    const ta = document.createElement('textarea');
    ta.maxLength = 140;
    ta.placeholder = '\u4f8b\u5982: \u4e00\u5ea7\u57ce\u5821';
    Object.assign(ta.style, {
      position: 'fixed', left: '50%', transform: 'translateX(-50%)',
      width: '280px', height: '80px',
      background: '#161225', color: '#f2e8d0',
      border: '2px solid #e8b84a', borderRadius: '10px',
      padding: '12px', fontSize: '16px', fontFamily: '"Avenir Next", "Segoe UI", sans-serif',
      resize: 'none', outline: 'none', display: 'none',
      zIndex: '1000', boxSizing: 'border-box',
    });
    document.body.appendChild(ta);
    this._textarea = ta;

    const btn = document.createElement('button');
    btn.textContent = '\u786e\u5b9a';
    Object.assign(btn.style, {
      position: 'fixed', left: '50%', transform: 'translateX(-50%)',
      width: '280px', height: '44px',
      background: '#1e1a30', color: '#f2e8d0',
      border: '2px solid #e8b84a', borderRadius: '10px',
      fontSize: '16px', fontFamily: '"Avenir Next", "Segoe UI", sans-serif', cursor: 'pointer',
      display: 'none', zIndex: '1000', boxSizing: 'border-box',
    });
    btn.addEventListener('click', () => this._onConfirmInput());
    document.body.appendChild(btn);
    this._confirmBtn = btn;
  }

  _showDOMElements() {
    if (!this._textarea) return;
    const rect = this._game.canvas.getBoundingClientRect();
    const scale = rect.width / C.SCREEN_W;
    const taTop = rect.top + 160 * scale;
    this._textarea.style.top = taTop + 'px';
    this._textarea.style.display = 'block';
    this._textarea.value = this._promptText;
    this._textarea.focus();
    this._confirmBtn.style.top = (taTop + 90 * scale) + 'px';
    this._confirmBtn.style.display = 'block';
  }

  _hideDOMElements() {
    if (this._textarea) { this._textarea.style.display = 'none'; this._textarea.blur(); }
    if (this._confirmBtn) this._confirmBtn.style.display = 'none';
  }

  _onConfirmInput() {
    const text = (this._textarea.value || '').trim();
    if (!text) {
      this._textarea.style.borderColor = '#e04050';
      setTimeout(() => { if (this._textarea) this._textarea.style.borderColor = '#e8b84a'; }, 500);
      return;
    }
    this._promptText = text;
    this._hideDOMElements();
    this._handleGenerate();
  }

  async _handleGenerate() {
    if (this._status === 'generating') return;
    this._status = 'generating';
    this._tagRects = [];
    this._generateStartTime = Date.now();
    this._processingDots = 0;
    this._processingTimer = 0;
    this._buildButtons();

    for (let attempt = 0; attempt < 2; attempt++) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 180000);
        const response = await fetch(API_BASE + '/api/generate-level', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: this._promptText }),
          signal: controller.signal,
        });
        clearTimeout(timeoutId);
        if (!response.ok) {
          const errBody = await response.json().catch(() => ({}));
          throw new Error(errBody.error || 'HTTP ' + response.status);
        }
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        if (!data.gridWidth || !data.gridHeight || !Array.isArray(data.bricks) || data.bricks.length === 0) {
          throw new Error('\u670d\u52a1\u5668\u8fd4\u56de\u4e86\u65e0\u6548\u7684\u5173\u5361\u6570\u636e');
        }
        this._previewLevel = _applyColors(data);
        this._status = 'ready';
        this._statusText = '\u5df2\u94f8\u9020: ' + data.bricks.length + ' \u4e2a\u7816\u5757';
        this._buildButtons();
        return;
      } catch (err) {
        if (attempt === 0) {
          this._generateStartTime = Date.now();
          continue;
        }
        this._status = 'error';
        this._statusText = err.name === 'AbortError'
          ? '\u94f8\u9020\u8d85\u65f6\uff0c\u8bf7\u91cd\u8bd5'
          : '\u94f8\u9020\u5931\u8d25: ' + (err.message || '\u8bf7\u91cd\u8bd5');
      }
    }
    this._buildButtons();
  }

  update(dt) {
    this._enterTime += dt;
    if (this._pressTimer > 0) {
      this._pressTimer -= dt;
      if (this._pressTimer <= 0) this._pressedBtn = null;
    }
    if (this._status === 'generating') {
      this._processingTimer += dt;
      if (this._processingTimer >= 0.4) {
        this._processingTimer = 0;
        this._processingDots = (this._processingDots + 1) % 4;
      }
    }
  }

  render() {
    const r = this._game.renderer;
    const ctx = r.ctx;
    r.drawBackground();
    r.drawTitle('\u521b\u9020\u6a21\u5f0f', 58, 26);
    r.drawOrnament(78, 140);

    switch (this._status) {
      case 'idle':       this._renderIdle(r, ctx);       break;
      case 'inputting':  this._renderInputting(r, ctx);  break;
      case 'generating': this._renderGenerating(r, ctx); break;
      case 'ready':      this._renderReady(r, ctx);      break;
      case 'error':      this._renderError(r, ctx);      break;
    }

    for (const btn of this._buttons) {
      r.drawButton(btn.x, btn.y, btn.w, btn.h, btn.text, {
        highlighted: this._pressedBtn === btn,
      });
    }
  }

  _renderIdle(r, ctx) {
    // Large decorative icon
    ctx.textAlign = 'center';
    ctx.font = '44px sans-serif';
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = Theme.accent;
    ctx.fillText('\u2728', C.SCREEN_W / 2, 160);
    ctx.globalAlpha = 1;

    r.drawPulseSubtitle('\u63cf\u8ff0\u4f60\u60f3\u8981\u7684\u7816\u5757\u56fe\u6848', 200, 14);

    // Subtitle
    ctx.font = '11px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textMuted;
    ctx.fillText('\u70b9\u51fb\u6807\u7b7e\u5feb\u901f\u5f00\u59cb\uff0c\u6216\u8f93\u5165\u81ea\u5b9a\u4e49\u63cf\u8ff0', C.SCREEN_W / 2, 225);

    this._renderTags(r, ctx);
  }

  _renderInputting(r, ctx) {
    ctx.textAlign = 'center';
    ctx.font = '14px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText('\u8f93\u5165\u4f60\u7684\u521b\u610f\u63cf\u8ff0', C.SCREEN_W / 2, 110);
    const remaining = 140 - (this._textarea ? this._textarea.value.length : 0);
    ctx.font = '11px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textMuted;
    ctx.fillText('\u5269\u4f59 ' + remaining + ' \u5b57', C.SCREEN_W / 2, 290);
  }

  _renderGenerating(r, ctx) {
    const elapsed = (Date.now() - this._generateStartTime) / 1000;
    const dots = '.'.repeat(this._processingDots);

    // Animated forge/forge spinner
    this._drawForgeAnimation(ctx, C.SCREEN_W / 2, 180, elapsed);

    ctx.textAlign = 'center';
    ctx.font = '15px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textPrimary;
    ctx.globalAlpha = Math.sin(Date.now() / 300) * 0.2 + 0.8;
    ctx.fillText('\u6b63\u5728\u94f8\u9020\u4f60\u7684\u5173\u5361' + dots, C.SCREEN_W / 2, 240);
    ctx.globalAlpha = 1;

    let phase = elapsed < 1.5 ? '\u89e3\u8bfb\u63cf\u8ff0...' : elapsed < 3 ? '\u8bbe\u8ba1\u5e03\u5c40...' : '\u94f8\u9020\u7816\u5757...';
    ctx.font = '12px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText(phase, C.SCREEN_W / 2, 270);

    // Progress bar
    const barW = 200, barH = 3;
    const barX = (C.SCREEN_W - barW) / 2;
    const barY = 290;
    ctx.fillStyle = 'rgba(232,184,74,0.15)';
    ctx.fillRect(barX, barY, barW, barH);
    const progress = Math.min(1, elapsed / 10);
    ctx.fillStyle = Theme.accent;
    ctx.fillRect(barX, barY, barW * progress, barH);

    ctx.font = '12px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.accent;
    ctx.fillText('\u300c' + this._promptText + '\u300d', C.SCREEN_W / 2, 330);
  }

  _drawForgeAnimation(ctx, x, y, t) {
    ctx.save();
    ctx.translate(x, y);

    // Rotating ring of dots
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2 - t * 2;
      const alpha = ((i + Math.floor(t * 12)) % 12) / 12;
      ctx.globalAlpha = 0.15 + alpha * 0.6;
      ctx.fillStyle = Theme.accent;
      const dx = Math.cos(angle) * 20;
      const dy = Math.sin(angle) * 20;
      ctx.save();
      ctx.translate(dx, dy);
      ctx.rotate(Math.PI / 4);
      ctx.fillRect(-1.5, -1.5, 3, 3);
      ctx.restore();
    }

    // Center pulsing diamond
    const pulse = Math.sin(t * 4) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = Theme.accent;
    ctx.save();
    ctx.rotate(Math.PI / 4 + t * 0.5);
    ctx.fillRect(-5, -5, 10, 10);
    ctx.restore();

    ctx.restore();
    ctx.globalAlpha = 1;
  }

  _renderReady(r, ctx) {
    ctx.textAlign = 'center';
    ctx.font = '13px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.accent;
    ctx.fillText('\u300c' + this._promptText + '\u300d', C.SCREEN_W / 2, 100);

    ctx.font = '10px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText('PREVIEW', C.SCREEN_W / 2, 125);

    if (this._previewLevel) this._renderPreview(ctx, 140);

    ctx.textAlign = 'center';
    ctx.font = '12px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText(this._statusText, C.SCREEN_W / 2, 470);
  }

  _renderError(r, ctx) {
    // Error icon
    ctx.textAlign = 'center';
    ctx.font = '36px sans-serif';
    ctx.globalAlpha = 0.4;
    ctx.fillText('\u26a0\ufe0f', C.SCREEN_W / 2, 260);
    ctx.globalAlpha = 1;

    ctx.font = '13px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.accent2;
    ctx.fillText(this._statusText, C.SCREEN_W / 2, 310);
    if (this._promptText) {
      ctx.font = '12px "Avenir Next", "Segoe UI", sans-serif';
      ctx.fillStyle = Theme.textSecondary;
      ctx.fillText('\u300c' + this._promptText + '\u300d', C.SCREEN_W / 2, 345);
    }
  }

  _renderTags(r, ctx) {
    const tagY = 290, tagH = 36, gapX = 8, gapY = 8;
    ctx.font = '12px "Avenir Next", "Segoe UI", sans-serif';

    // Calculate widths first
    const widths = this._tags.map(t => ctx.measureText(t).width + 28);

    // Flow layout: wrap tags into multiple rows
    const maxRowW = C.SCREEN_W - 40;
    const rows = [];
    let currentRow = [];
    let currentRowW = 0;

    for (let i = 0; i < this._tags.length; i++) {
      const tw = widths[i];
      if (currentRowW + tw + (currentRow.length > 0 ? gapX : 0) > maxRowW && currentRow.length > 0) {
        rows.push(currentRow);
        currentRow = [];
        currentRowW = 0;
      }
      currentRow.push({ tag: this._tags[i], width: tw, index: i });
      currentRowW += tw + (currentRow.length > 1 ? gapX : 0);
    }
    if (currentRow.length > 0) rows.push(currentRow);

    this._tagRects = [];
    let y = tagY;

    for (const row of rows) {
      const totalRowW = row.reduce((s, r) => s + r.width, 0) + (row.length - 1) * gapX;
      let x = (C.SCREEN_W - totalRowW) / 2;

      for (const item of row) {
        const tw = item.width;

        // Tag pill with gradient
        const tagGrad = ctx.createLinearGradient(x, y, x, y + tagH);
        tagGrad.addColorStop(0, 'rgba(30,26,48,0.9)');
        tagGrad.addColorStop(1, 'rgba(18,16,30,0.9)');
        ctx.fillStyle = tagGrad;
        ctx.beginPath();
        ctx.roundRect(x, y, tw, tagH, tagH / 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(232,184,74,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = Theme.button.text;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(item.tag, x + tw / 2, y + tagH / 2);

        this._tagRects[item.index] = { x, y, w: tw, h: tagH };
        x += tw + gapX;
      }
      y += tagH + gapY;
    }
    ctx.textBaseline = 'alphabetic';
  }

  _renderPreview(ctx, startY) {
    const level = this._previewLevel;
    const previewW = C.SCREEN_W - 40;
    const maxPreviewH = 300;
    const rawH = Math.round(previewW * (level.gridHeight / level.gridWidth));
    const previewH = Math.min(rawH, maxPreviewH);
    const previewX = 20;

    // Corner brackets
    const r = this._game.renderer;
    r.drawCornerBrackets(previewX - 2, startY - 2, previewW + 4, previewH + 4, 8);

    ctx.fillStyle = Theme.bg;
    ctx.fillRect(previewX, startY, previewW, previewH);

    const bw = previewW / level.gridWidth;
    const bh = previewH / level.gridHeight;
    for (const b of level.bricks) {
      ctx.fillStyle = b.color ? (Array.isArray(b.color) ? b.color[0] : b.color) : Theme.accent;
      ctx.fillRect(previewX + b.col * bw + 0.5, startY + b.row * bh + 0.5, bw - 1, bh - 1);
    }

    const pw = 30, ph = 4;
    ctx.fillStyle = Theme.accent;
    ctx.beginPath();
    ctx.roundRect(previewX + previewW / 2 - pw / 2, startY + previewH - ph - 3, pw, ph, 2);
    ctx.fill();
  }

  onTap(x, y) {
    if (this._status === 'idle' && this._tagRects.length) {
      for (let i = 0; i < this._tagRects.length; i++) {
        const tr = this._tagRects[i];
        if (tr && x >= tr.x && x <= tr.x + tr.w && y >= tr.y && y <= tr.y + tr.h) {
          if (typeof audio !== 'undefined') { audio.init(); audio.playClick(); }
          let chosen = this._tags[i];
          if (chosen === '\u968f\u673a') {
            chosen = this._randomPool[Math.floor(Math.random() * this._randomPool.length)];
          }
          this._promptText = chosen;
          if (this._textarea) this._textarea.value = chosen;
          this._handleGenerate();
          return;
        }
      }
    }

    for (const btn of this._buttons) {
      if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
        this._pressedBtn = btn;
        this._pressTimer = 0.12;
        if (typeof audio !== 'undefined') { audio.init(); audio.playClick(); }
        switch (btn.action) {
          case 'input':
          case 'edit':
            this._status = 'inputting';
            this._buildButtons();
            this._showDOMElements();
            break;
          case 'back':
            this._game.stateMachine.transition('MENU');
            break;
          case 'play':
            if (this._previewLevel) {
              this._game.stateMachine.transition('PLAYING', {
                level: this._previewLevel, levelIndex: -1,
              });
            }
            break;
          case 'regenerate':
          case 'retry':
            this._handleGenerate();
            break;
        }
        return;
      }
    }
  }

  onMove() {}
}


// src/image/median-cut.js
// Provides: MedianCut
// Depends: (none)

class MedianCut {

  /**
   * Quantize an array of [r, g, b] pixels down to at most `maxColors` colors.
   * Returns an array of [r, g, b] representative colors (the palette).
   */
  static quantize(pixels, maxColors = 24) {
    if (pixels.length === 0) return [];

    // Start with a single bucket containing all pixels
    let buckets = [pixels.slice()];

    // Iteratively split the bucket with the largest color range
    while (buckets.length < maxColors) {
      let maxRange = -1;
      let maxIdx = 0;

      // Find the bucket whose dominant channel spans the widest range
      for (let i = 0; i < buckets.length; i++) {
        const range = MedianCut._getRange(buckets[i]);
        if (range.maxRange > maxRange) {
          maxRange = range.maxRange;
          maxIdx = i;
        }
      }

      // No further splitting possible (all buckets are uniform)
      if (maxRange <= 0) break;

      const bucket = buckets[maxIdx];
      const range = MedianCut._getRange(bucket);

      // Sort along the channel with the widest spread
      bucket.sort((a, b) => a[range.channel] - b[range.channel]);

      // Split at the median
      const mid = Math.floor(bucket.length / 2);
      const left = bucket.slice(0, mid);
      const right = bucket.slice(mid);

      // Replace original bucket with the two halves
      buckets.splice(maxIdx, 1, left, right);
    }

    // Compute the average color for each bucket → palette entry
    return buckets
      .filter(b => b.length > 0)
      .map(bucket => {
        const avg = [0, 0, 0];
        for (const p of bucket) {
          avg[0] += p[0];
          avg[1] += p[1];
          avg[2] += p[2];
        }
        return [
          Math.round(avg[0] / bucket.length),
          Math.round(avg[1] / bucket.length),
          Math.round(avg[2] / bucket.length),
        ];
      });
  }

  /**
   * Determine which RGB channel has the largest spread within a bucket,
   * and return that channel index plus the spread value.
   */
  static _getRange(bucket) {
    let minR = 255, maxR = 0;
    let minG = 255, maxG = 0;
    let minB = 255, maxB = 0;

    for (const p of bucket) {
      if (p[0] < minR) minR = p[0]; if (p[0] > maxR) maxR = p[0];
      if (p[1] < minG) minG = p[1]; if (p[1] > maxG) maxG = p[1];
      if (p[2] < minB) minB = p[2]; if (p[2] > maxB) maxB = p[2];
    }

    const ranges = [maxR - minR, maxG - minG, maxB - minB];
    let channel = 0;
    if (ranges[1] > ranges[0]) channel = 1;
    if (ranges[2] > ranges[channel]) channel = 2;

    return { channel, maxRange: ranges[channel] };
  }

  /**
   * Find the closest color in `palette` to the given `pixel` [r, g, b],
   * using squared Euclidean distance in RGB space.
   */
  static closestColor(pixel, palette) {
    let minDist = Infinity;
    let closest = palette[0];

    for (const c of palette) {
      const dr = pixel[0] - c[0];
      const dg = pixel[1] - c[1];
      const db = pixel[2] - c[2];
      const dist = dr * dr + dg * dg + db * db;
      if (dist < minDist) {
        minDist = dist;
        closest = c;
      }
    }

    return closest;
  }
}


// src/image/brick-mapper.js
// Provides: BrickMapper
// Depends: MedianCut

class BrickMapper {

  /**
   * Convert an ImageData object to a level descriptor.
   * @param {ImageData} imageData - Raw pixel data from a canvas context.
   * @param {number}    gridWidth - Number of brick columns (default 20).
   * @param {number}    gridHeight - Number of brick rows (default 14).
   * @returns {object}  Level descriptor with name, bricks[], and settings.
   */
  static imageToLevel(imageData, gridWidth = 56, gridHeight = 40) {
    const { width, height, data } = imageData;

    // Dimensions of one grid cell in source-pixel space
    const cellW = width / gridWidth;
    const cellH = height / gridHeight;

    const gridPixels = []; // [row][col] = [r, g, b]
    const allPixels = [];  // flat list for palette extraction

    // --- Sample: compute average color per grid cell ---
    for (let r = 0; r < gridHeight; r++) {
      gridPixels[r] = [];
      for (let c = 0; c < gridWidth; c++) {
        let avgR = 0, avgG = 0, avgB = 0, count = 0;

        const startX = Math.floor(c * cellW);
        const startY = Math.floor(r * cellH);
        const endX   = Math.floor((c + 1) * cellW);
        const endY   = Math.floor((r + 1) * cellH);

        for (let py = startY; py < endY; py++) {
          for (let px = startX; px < endX; px++) {
            const idx = (py * width + px) * 4;
            avgR += data[idx];
            avgG += data[idx + 1];
            avgB += data[idx + 2];
            count++;
          }
        }

        if (count > 0) {
          avgR = Math.round(avgR / count);
          avgG = Math.round(avgG / count);
          avgB = Math.round(avgB / count);
        }

        gridPixels[r][c] = [avgR, avgG, avgB];
        allPixels.push([avgR, avgG, avgB]);
      }
    }

    // --- Quantize all sampled colors into a compact palette ---
    const palette = MedianCut.quantize(allPixels, 32);

    // --- Map each grid cell to a brick (or skip if near-white) ---
    const bricks = [];

    for (let r = 0; r < gridHeight; r++) {
      for (let c = 0; c < gridWidth; c++) {
        const pixel = gridPixels[r][c];
        const color = MedianCut.closestColor(pixel, palette);

        // Perceived luminance (ITU-R BT.601)
        const luminance =
          (0.299 * color[0] + 0.587 * color[1] + 0.114 * color[2]) / 255;

        // Very bright cells are treated as empty space (background)
        if (luminance > 0.90) continue;

        // All image bricks are hp=1 (one hit to destroy)
        // The fun is in seeing the picture, not grinding through tough bricks
        const hp = 1;

        // Convert [r, g, b] to hex string
        const hexColor =
          '#' +
          color[0].toString(16).padStart(2, '0') +
          color[1].toString(16).padStart(2, '0') +
          color[2].toString(16).padStart(2, '0');

        bricks.push({ row: r, col: c, hp, color: hexColor });
      }
    }

    return {
      name: '自定义 - 图片关卡',
      gridWidth,
      gridHeight,
      ballSpeed: 280,
      paddleWidth: 120,
      bricks,
      lives: 5,
    };
  }
}


// src/input/input-manager.js
// Provides: InputManager
// Depends: C

class InputManager {

  constructor(canvas, game) {
    this._game = game;
    this._canvas = canvas;
    this._firstFingerId = null;   // track only one finger at a time

    // --- Mouse events ---
    canvas.addEventListener('mousedown', (e) => {
      this._onDown(e.clientX, e.clientY);
    });
    canvas.addEventListener('mousemove', (e) => {
      this._onMove(e.clientX, e.clientY);
    });

    // --- Touch events ---
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      this._firstFingerId = t.identifier;
      this._onDown(t.clientX, t.clientY);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === this._firstFingerId) {
          this._onMove(t.clientX, t.clientY);
          break;
        }
      }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === this._firstFingerId) {
          this._firstFingerId = null;
          break;
        }
      }
    });
  }

  // --- Coordinate conversion ---

  /**
   * Map a viewport-space (client) coordinate pair to game-space coordinates,
   * accounting for any CSS scaling applied to the canvas element.
   */
  _toGame(clientX, clientY) {
    const rect = this._canvas.getBoundingClientRect();
    const scaleX = C.SCREEN_W / rect.width;
    const scaleY = C.SCREEN_H / rect.height;
    return [
      (clientX - rect.left) * scaleX,
      (clientY - rect.top)  * scaleY,
    ];
  }

  // --- Event dispatch ---

  _onDown(clientX, clientY) {
    const [x, y] = this._toGame(clientX, clientY);
    const scene = this._game.stateMachine.getActiveScene();
    if (scene && scene.onTap) scene.onTap(x, y);
  }

  _onMove(clientX, clientY) {
    const [x, y] = this._toGame(clientX, clientY);
    const scene = this._game.stateMachine.getActiveScene();
    if (scene && scene.onMove) scene.onMove(x, y);
  }
}


// src/game.js
// Provides: Game, game (global instance)
// Depends: C, STATES, Renderer, StateMachine, InputManager,
//          MenuScene, LevelSelectScene, GameScene, PausedScene,
//          ResultScene, ImageUploadScene, CreativeScene

class Game {

  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');

    // Player progress — number of levels accessible
    this.unlockedLevels = 1;
    this._loadProgress();

    // Responsive canvas sizing
    this._setupCanvas();
    window.addEventListener('resize', () => this._setupCanvas());

    // --- Sub-systems ---
    this.renderer = new Renderer(this.ctx, C.SCREEN_W, C.SCREEN_H);
    this.stateMachine = new StateMachine();

    // --- Register all scenes ---
    const menuScene        = new MenuScene(this);
    const levelSelectScene = new LevelSelectScene(this);
    const gameScene        = new GameScene(this);
    const pausedScene      = new PausedScene(this);
    const winScene         = new ResultScene(this, 'WIN');
    const loseScene        = new ResultScene(this, 'LOSE');
    const imageUploadScene = new ImageUploadScene(this);
    const creativeScene = new CreativeScene(this);

    this.stateMachine.registerScene(STATES.MENU,         menuScene);
    this.stateMachine.registerScene(STATES.LEVEL_SELECT,  levelSelectScene);
    this.stateMachine.registerScene(STATES.PLAYING,       gameScene);
    this.stateMachine.registerScene(STATES.PAUSED,        pausedScene);
    this.stateMachine.registerScene(STATES.WIN,           winScene);
    this.stateMachine.registerScene(STATES.LOSE,          loseScene);
    this.stateMachine.registerScene(STATES.IMAGE_UPLOAD,  imageUploadScene);
    this.stateMachine.registerScene(STATES.CREATIVE,     creativeScene);

    // --- Input ---
    this.input = new InputManager(canvas, this);

    // --- Enter the initial scene ---
    menuScene.enter();

    // --- Start the game loop ---
    this._lastTime = performance.now();
    this._accumulator = 0;
    this._loop();
  }

  // --- Canvas setup ---

  /**
   * Size the canvas element to fill the viewport while preserving the
   * game's logical aspect ratio.  Uses devicePixelRatio for crisp rendering.
   */
  _setupCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const maxW = window.innerWidth;
    const maxH = window.innerHeight;
    const aspect = C.SCREEN_W / C.SCREEN_H;

    let w, h;
    if (maxW / maxH < aspect) {
      // Viewport is narrower than game — fit to width
      w = maxW;
      h = maxW / aspect;
    } else {
      // Viewport is taller than game — fit to height
      h = maxH;
      w = maxH * aspect;
    }

    // CSS size (logical pixels)
    this.canvas.style.width  = w + 'px';
    this.canvas.style.height = h + 'px';

    // Backing-store size (physical pixels)
    this.canvas.width  = C.SCREEN_W * dpr;
    this.canvas.height = C.SCREEN_H * dpr;

    // Re-acquire context and apply DPR scaling
    this.ctx = this.canvas.getContext('2d');
    this.ctx.scale(dpr, dpr);

    // Keep the renderer in sync with the (potentially new) context
    if (this.renderer) {
      this.renderer.ctx = this.ctx;
    }
  }

  // --- Persistence ---

  _loadProgress() {
    try {
      const saved = localStorage.getItem('breakout-maker-progress');
      if (saved) {
        const data = JSON.parse(saved);
        this.unlockedLevels = data.unlockedLevels || 1;
      }
    } catch (e) {
      // localStorage may be unavailable in some contexts — ignore
    }
  }

  _saveProgress() {
    try {
      localStorage.setItem(
        'breakout-maker-progress',
        JSON.stringify({ unlockedLevels: this.unlockedLevels })
      );
    } catch (e) {
      // Silently ignore write failures
    }
  }

  // --- Game loop ---

  /**
   * The main frame loop.
   *
   * - For the PLAYING state a **fixed timestep** is used so that physics
   *   behaves identically regardless of display refresh rate.
   * - All other states (menus, paused, results) use a simple variable
   *   timestep which is fine for UI animations.
   * - The accumulator is capped to C.MAX_ACCUMULATOR to prevent a
   *   "spiral of death" after long pauses (e.g. switching browser tabs).
   */
  _loop() {
    const now = performance.now();
    let dt = (now - this._lastTime) / 1000;   // seconds
    this._lastTime = now;

    // Clamp to avoid huge jumps after tab-switch / debugger pause
    if (dt > C.MAX_ACCUMULATOR) dt = C.MAX_ACCUMULATOR;

    // Let the renderer update its own timer (used for animated effects)
    this.renderer.update(dt);

    // Dispatch to the active scene
    const scene = this.stateMachine.getActiveScene();

    if (scene) {
      if (this.stateMachine.state === STATES.PLAYING) {
        // ---- Fixed-timestep physics ----
        this._accumulator += dt;
        let steps = 0;

        while (this._accumulator >= C.FIXED_DT && steps < C.MAX_STEPS) {
          scene.update(C.FIXED_DT);
          this._accumulator -= C.FIXED_DT;
          steps++;

          // If the scene triggered a state transition mid-step, stop
          if (this.stateMachine.state !== STATES.PLAYING) break;
        }

        // Safety valve: discard leftover time if it grew too large
        if (this._accumulator > C.MAX_ACCUMULATOR) {
          this._accumulator = 0;
        }
      } else {
        // ---- Variable timestep for UI scenes ----
        scene.update(dt);
      }

      scene.render();
    }

    // Persist player progress (cheap JSON write, OK every frame)
    this._saveProgress();

    // Schedule next frame
    requestAnimationFrame(() => this._loop());
  }
}


// ============================================================================
// Boot — create the Game instance once the DOM is ready
// ============================================================================
const game = new Game(document.getElementById('gameCanvas'));

  </script>
