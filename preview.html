    * { margin: 0; padding: 0; box-sizing: border-box; }

      width: 100%; height: 100%;
      overflow: hidden;
      background: #060410;

      align-items: center;
      justify-content: center;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

      display: block;
      image-rendering: pixelated;
      border-radius: 4px;
    }

    textarea::placeholder {
      color: rgba(144,136,168,0.5);
    }
    textarea:focus {
      border-color: #e8b84a !important;
      box-shadow: 0 0 12px rgba(232,184,74,0.2);
    }
    button:active {
      background: #2a2440 !important;
    }
  </style>
</head>

function _applyColors(level) {
  const copy = JSON.parse(JSON.stringify(level));
  for (const brick of copy.bricks) {
    // Preserve colours from image-generated levels; only apply HP-based
    // theme colours when no colour was provided by the server.
    if (!brick.color) {
      brick.color = _brickColor(brick.hp);
    }
  }
  return copy;
}

function getPresetLevel(index) {
  if (index < 0 || index >= LEVEL_DATA.length) return null;
  return _applyColors(LEVEL_DATA[index]);
}

function getTotalLevels() {
  return LEVEL_DATA.length;
}

// Provides: PowerUpType, POWER_UP_WEIGHTS, POWER_UP_DROP_CHANCE

const PowerUpType = {
  SPLIT: 'split',             // 1 ball → 3
  MULTI_SHOT: 'multiShot',   // Paddle fires 3 new balls
  FIREBALL: 'fireball',      // Ball burns through bricks for 8 seconds
  WIDE_PADDLE: 'widePaddle', // Paddle 1.5× wider for 10 seconds
  EXTRA_LIFE: 'extraLife',   // +1 life
};

/** Weighted probability table for power-up drops. */
const POWER_UP_WEIGHTS = [
  { type: PowerUpType.SPLIT,       weight: 25 },
  { type: PowerUpType.MULTI_SHOT,  weight: 20 },
  { type: PowerUpType.FIREBALL,    weight: 15 },
  { type: PowerUpType.WIDE_PADDLE, weight: 25 },
  { type: PowerUpType.EXTRA_LIFE,  weight: 15 },
];

/** Chance (0–1) that a destroyed brick drops a power-up. */
const POWER_UP_DROP_CHANCE = 0.15;


// src/event-bus.js
// Provides: EventBus
// Depends: (none)

class EventBus {
  constructor() {
    this._listeners = {};
  }

  /** Subscribe to an event. */
  on(evt, fn) {
    (this._listeners[evt] ||= []).push(fn);
  }

  /** Unsubscribe from an event. */
  off(evt, fn) {
    const a = this._listeners[evt];
    if (a) this._listeners[evt] = a.filter(f => f !== fn);
  }

  /** Emit an event with optional arguments. */
  emit(evt, ...args) {
    (this._listeners[evt] || []).forEach(fn => fn(...args));
  }
}


// src/entities/ball.js
// Provides: Ball
// Depends: C

class Ball {
  /**
   * @param {number} x  - centre x
   * @param {number} y  - centre y
   * @param {number} radius
   */
  constructor(x, y, radius = C.BALL_RADIUS) {
    this.x = x;
    this.y = y;
    this.radius = radius;

    this.vx = 0;
    this.vy = 0;
    this.speed = C.BALL_SPEED;

    this.isFireball = false;   // fireball mode — destroys any brick in one hit
    this.fireballTimer = 0;    // seconds remaining for fireball
    this.trail = [];           // last 5 positions for rendering a trail
  }

  /** Launch the ball at a given angle (radians, 0 = straight up). */
  launch(angle = C.LAUNCH_ANGLE) {
    this.vx = this.speed * Math.sin(angle);
    this.vy = -this.speed * Math.cos(angle);
  }

  /** Re-normalise velocity so its magnitude equals this.speed. */
  normalizeSpeed() {
    const mag = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (mag < 1) {
      // Near-zero velocity — default to straight up
      this.vx = 0;
      this.vy = -this.speed;
      return;
    }
    this.vx = (this.vx / mag) * this.speed;
    this.vy = (this.vy / mag) * this.speed;
  }

  /** Advance the ball by dt seconds. */
  update(dt) {
    // Store previous position for trail effect
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 5) this.trail.shift();

    // Tick fireball timer
    if (this.isFireball) {
      this.fireballTimer -= dt;
      if (this.fireballTimer <= 0) {
        this.isFireball = false;
      }
    }

    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }
}

    this.isWide = true;

  }

  /** Advance paddle state by dt seconds. */
  update(dt) {
    // Wide paddle timer
    if (this.isWide) {
      this.wideTimer -= dt;
      if (this.wideTimer <= 0) {
        this.isWide = false;
        this.width = this.baseWidth;
      }
    }

    // Smooth interpolation toward target position
    const diff = this._targetX - this.x;
    this.x += diff * Math.min(1, C.PADDLE_SMOOTHING * dt * 60);
  }

  /**
   * Set the desired paddle position (clamped to screen bounds).
   * @param {number} x        - desired centre x
   * @param {number} screenW  - canvas / screen width
   */
  moveTo(x, screenW) {
    if (isNaN(x)) return;
    const half = this.width / 2;
    this._targetX = Math.max(half, Math.min(screenW - half, x));
  }

  /** Return an axis-aligned bounding box for the paddle. */
  getBounds() {
    return {
      left:   this.x - this.width / 2,
      right:  this.x + this.width / 2,
      top:    this.y - this.height / 2,
      bottom: this.y + this.height / 2,
    };
  }
}


// src/entities/brick.js
// Provides: Brick
// Depends: C

class Brick {
  /**
   * @param {number} row
   * @param {number} col
   * @param {number} hp     - hit points (10 = iron brick, tough but breakable)
   * @param {string|null} color - override colour, or null for hp-based
   */
  constructor(row, col, hp = 1, color = null) {
    this.row = row;
    this.col = col;
    // Convert legacy indestructible (999) to iron (10)
    this.hp = (hp >= C.INDESTRUCTIBLE_HP) ? C.IRONCLAD_HP : hp;
    this.maxHp = this.hp;
    this.color = color;     // explicit colour override
    this.alive = true;
    this.shakeTimer = 0;    // visual feedback on hit
  }

  /**
   * Register a hit on this brick.
   * @param {boolean} isFireball - if true, non-iron brick is destroyed instantly
   * @returns {boolean} true if the brick was destroyed by this hit
   */
  hit(isFireball = false) {
    // Iron bricks always take exactly 1 hp per hit (fireball doesn't one-shot them)
    if (this.maxHp >= C.IRONCLAD_HP) {
      this.hp--;
      if (this.hp <= 0) {
        this.alive = false;
        return true; // destroyed
      }
      this.shakeTimer = 0.15;
      return false;
    }

    if (isFireball) {
      this.hp = 0;
    } else {
      this.hp--;
    }

    if (this.hp <= 0) {
      this.alive = false;
      return true; // destroyed
    }

    this.shakeTimer = 0.1;
    return false; // damaged but not destroyed
  }

  /** Tick per-frame timers. */
  update(dt) {
    if (this.shakeTimer > 0) this.shakeTimer -= dt;
  }
}


// src/entities/brick-field.js
// Provides: BrickField
// Depends: C, Brick

class BrickField {
  /**
   * @param {object} level    - level descriptor { gridWidth, gridHeight, bricks[] }
   * @param {number} screenW  - canvas width
   */
  constructor(level, screenW) {
    this.gridW = level.gridWidth;
    this.gridH = level.gridHeight;
    this.bricks = [];           // 2-D array [row][col], null = empty slot
    this.totalDestructible = 0; // how many bricks can be destroyed
    this.destroyed = 0;         // how many have been destroyed so far

    // ---------- Calculate brick dimensions ----------
    const playW = screenW - 20; // 10 px padding each side
    this.brickW = (playW - (this.gridW - 1) * C.BRICK_GAP) / this.gridW;
    this.brickH = this.brickW;  // Square bricks!
    this.offsetX = 10;
    this.offsetY = C.PLAY_TOP + 10;

    // ---------- Initialise empty grid ----------
    for (let r = 0; r < this.gridH; r++) {
      this.bricks[r] = new Array(this.gridW).fill(null);
    }

    // ---------- Place bricks from level data ----------
    for (const b of level.bricks) {
      const brick = new Brick(b.row, b.col, b.hp, b.color || null);
      this.bricks[b.row][b.col] = brick;
      // All bricks are now destructible (iron bricks take 10 hits)
      this.totalDestructible++;
    }
  }

  /**
   * Return the pixel rectangle for a brick at (row, col).
   * @returns {{ x: number, y: number, w: number, h: number }}
   */
  getBrickRect(row, col) {
    return {
      x: this.offsetX + col * (this.brickW + C.BRICK_GAP),
      y: this.offsetY + row * (this.brickH + C.BRICK_GAP),
      w: this.brickW,
      h: this.brickH,
    };
  }

  /** True when every destructible brick has been destroyed. */
  isCleared() {
    return this.destroyed >= this.totalDestructible;
  }

  /** Tick all bricks (shake timers, etc.). */
  update(dt) {
    for (let r = 0; r < this.gridH; r++) {
      for (let c = 0; c < this.gridW; c++) {
        if (this.bricks[r][c]) this.bricks[r][c].update(dt);
      }
    }
  }
}


// src/entities/power-up-drop.js
// Provides: PowerUpDrop, rollPowerUpDrop
// Depends: C, PowerUpType, POWER_UP_WEIGHTS, POWER_UP_DROP_CHANCE

class PowerUpDrop {
  /**
   * @param {number} x
   * @param {number} y
   * @param {string} type - one of PowerUpType.*
   */
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type;
    this.radius = 10;
    this.vy = 100;          // constant fall speed (px/s)
    this.alive = true;
    this.rotation = 0;      // visual spin angle
  }

  /** Advance the drop by dt seconds. */
  update(dt) {
    this.y += this.vy * dt;
    this.rotation += dt * 3;
    // Remove if it falls off-screen
    if (this.y > C.SCREEN_H + 20) this.alive = false;
  }
}

/**
 * Possibly spawn a PowerUpDrop at (x, y) using weighted random selection.
 * @param {number} x
 * @param {number} y
 * @returns {PowerUpDrop|null}
 */
function rollPowerUpDrop(x, y) {
  if (Math.random() > POWER_UP_DROP_CHANCE) return null;

  // Weighted random selection from POWER_UP_WEIGHTS
  const totalWeight = POWER_UP_WEIGHTS.reduce((s, w) => s + w.weight, 0);
  let roll = Math.random() * totalWeight;
  for (const pw of POWER_UP_WEIGHTS) {
    roll -= pw.weight;
    if (roll <= 0) return new PowerUpDrop(x, y, pw.type);
  }

  // Fallback (should not normally be reached)
  return new PowerUpDrop(x, y, PowerUpType.SPLIT);
}


// src/entities/particle.js
// Provides: Particle
// Depends: (none)

class Particle {
  /**
   * @param {number} x
   * @param {number} y
   * @param {string} color - CSS colour
   */
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 200;
    this.vy = (Math.random() - 0.5) * 200 - 50; // biased upward
    this.life = 0.5 + Math.random() * 0.3;
    this.maxLife = this.life;
    this.color = color;
    this.size = 2 + Math.random() * 3;
  }

  /** Advance the particle (with gravity). */
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 200 * dt; // gravity
    this.life -= dt;
  }

  /** Current opacity (fades as life drains). */
  get alpha() {
    return Math.max(0, this.life / this.maxLife);
  }

  /** True when the particle should be removed. */
  get dead() {
    return this.life <= 0;
  }
}


// src/physics/collision.js
// Provides: CollisionDetector
// Depends: (none)

class CollisionDetector {
  /**
   * Swept collision test: ball centre ray vs Minkowski-expanded brick rect.
   * @param {Ball}   ball
   * @param {object} rect  - { x, y, w, h }
   * @param {number} dt    - timestep
   * @returns {{ t: number, nx: number, ny: number } | null}
   */
  static sweepBallVsRect(ball, rect, dt) {
    // Expand rect by ball radius on every side
    const expanded = {
      x: rect.x - ball.radius,
      y: rect.y - ball.radius,
      w: rect.w + ball.radius * 2,
      h: rect.h + ball.radius * 2,
    };

    const dx = ball.vx * dt;
    const dy = ball.vy * dt;

    let tMin = 0, tMax = 1;
    let normalX = 0, normalY = 0;

    // ---- X slab ----
    if (Math.abs(dx) < 1e-8) {
      // Ray is parallel to Y axis — must already be within X range
      if (ball.x < expanded.x || ball.x > expanded.x + expanded.w) return null;
    } else {
      let t1 = (expanded.x - ball.x) / dx;
      let t2 = (expanded.x + expanded.w - ball.x) / dx;
      let n = -1;
      if (t1 > t2) { [t1, t2] = [t2, t1]; n = 1; }
      if (t1 > tMin) { tMin = t1; normalX = n * Math.sign(dx) * -1; normalY = 0; }
      if (t2 < tMax) tMax = t2;
      if (tMin > tMax) return null;
    }

    // ---- Y slab ----
    if (Math.abs(dy) < 1e-8) {
      if (ball.y < expanded.y || ball.y > expanded.y + expanded.h) return null;
    } else {
      let t1 = (expanded.y - ball.y) / dy;
      let t2 = (expanded.y + expanded.h - ball.y) / dy;
      let n = -1;
      if (t1 > t2) { [t1, t2] = [t2, t1]; n = 1; }
      if (t1 > tMin) { tMin = t1; normalX = 0; normalY = n * Math.sign(dy) * -1; }
      if (t2 < tMax) tMax = t2;
      if (tMin > tMax) return null;
    }

    if (tMin < 0 || tMin > 1) return null;
    return { t: tMin, nx: normalX, ny: normalY };
  }
}


// src/physics/physics-world.js
// Provides: PhysicsWorld
// Depends: C, CollisionDetector

class PhysicsWorld {
  /**
   * @param {BrickField} brickField
   * @param {Paddle}     paddle
   * @param {number}     screenW
   * @param {number}     screenH
   */
  constructor(brickField, paddle, screenW, screenH) {
    this.bf = brickField;
    this.paddle = paddle;
    this.screenW = screenW;
    this.screenH = screenH;

    // External callbacks
    this.onBrickHit  = null; // (row, col, destroyed, brick)
    this.onBallLost  = null; // (ball)
    this.onPaddleHit = null; // (ball)
  }

  /**
   * Step the simulation for all balls.
   * @param {Ball[]} balls
   * @param {number} dt - seconds
   */
  tick(balls, dt) {
    for (const ball of balls) {
      ball.update(dt);
      this._wallCollision(ball);
      this._paddleCollision(ball, dt);
      this._brickCollisions(ball, dt);
      this._enforceMinVy(ball);

      // Check if ball fell off the bottom edge
      if (ball.y - ball.radius > this.screenH) {
        if (this.onBallLost) this.onBallLost(ball);
      }
    }
  }

  // ---- Wall bounces (left, right, top) ----
  _wallCollision(ball) {
    // Left wall
    if (ball.x - ball.radius < 0) {
      ball.x = ball.radius;
      ball.vx = Math.abs(ball.vx);
    }
    // Right wall
    if (ball.x + ball.radius > this.screenW) {
      ball.x = this.screenW - ball.radius;
      ball.vx = -Math.abs(ball.vx);
    }
    // Top wall (below HUD area)
    if (ball.y - ball.radius < C.PLAY_TOP) {
      ball.y = C.PLAY_TOP + ball.radius;
      ball.vy = Math.abs(ball.vy);
    }
  }

  // ---- Paddle reflection ----
  _paddleCollision(ball, dt) {
    const pb = this.paddle.getBounds();

    // Quick x-range check (with ball radius margin)
    const withinX = ball.x >= pb.left - ball.radius && ball.x <= pb.right + ball.radius;
    if (!withinX || ball.vy <= 0) return; // only collide when ball is moving downward

    const ballBottom = ball.y + ball.radius;
    const prevBottom = ballBottom - ball.vy * dt;

    const overlap = ballBottom >= pb.top && ball.y - ball.radius < pb.bottom;
    const swept   = prevBottom <= pb.top && ballBottom >= pb.top;

    if (overlap || swept) {
      // Place ball on top of paddle
      ball.y = pb.top - ball.radius;

      // Reflect based on where the ball hit the paddle (-1 = left edge, +1 = right edge)
      const hitPos = (ball.x - this.paddle.x) / (this.paddle.width / 2);
      const angle  = hitPos * C.MAX_REFLECT_ANGLE;
      ball.vx =  ball.speed * Math.sin(angle);
      ball.vy = -ball.speed * Math.cos(angle);

      if (this.onPaddleHit) this.onPaddleHit(ball);
    }
  }

  // ---- Brick collisions (find nearest swept hit) ----
  _brickCollisions(ball, dt) {
    let nearest  = null;
    let nearestT = Infinity;
    let nearestR = -1;
    let nearestC = -1;

    // AABB early-out: only check bricks near the ball's swept path
    const cellW = this.bf.brickW + C.BRICK_GAP;
    const cellH = this.bf.brickH + C.BRICK_GAP;
    const futureX = ball.x + ball.vx * dt;
    const futureY = ball.y + ball.vy * dt;
    const bx0 = Math.min(ball.x, futureX) - ball.radius;
    const bx1 = Math.max(ball.x, futureX) + ball.radius;
    const by0 = Math.min(ball.y, futureY) - ball.radius;
    const by1 = Math.max(ball.y, futureY) + ball.radius;

    const rMin = Math.max(0, Math.floor((by0 - this.bf.offsetY) / cellH) - 1);
    const rMax = Math.min(this.bf.gridH - 1, Math.ceil((by1 - this.bf.offsetY) / cellH) + 1);
    const cMin = Math.max(0, Math.floor((bx0 - this.bf.offsetX) / cellW) - 1);
    const cMax = Math.min(this.bf.gridW - 1, Math.ceil((bx1 - this.bf.offsetX) / cellW) + 1);

    for (let r = rMin; r <= rMax; r++) {
      for (let c = cMin; c <= cMax; c++) {
        const brick = this.bf.bricks[r][c];
        if (!brick || !brick.alive) continue;

        const rect = this.bf.getBrickRect(r, c);
        const hit  = CollisionDetector.sweepBallVsRect(ball, rect, dt);
        if (hit && hit.t < nearestT) {
          nearest  = hit;
          nearestT = hit.t;
          nearestR = r;
          nearestC = c;
        }
      }
    }

    if (nearest) {
      // Move ball to the collision point
      ball.x += ball.vx * dt * nearest.t;
      ball.y += ball.vy * dt * nearest.t;
      // Remove the remaining movement (already applied in ball.update)
      ball.x -= ball.vx * dt;
      ball.y -= ball.vy * dt;

      const brick = this.bf.bricks[nearestR][nearestC];
      const destroyed = brick.hit(ball.isFireball);
      if (destroyed) this.bf.destroyed++;

      // Reflect velocity (fireball punches through without reflecting)
      if (!ball.isFireball) {
        if (nearest.nx !== 0) ball.vx *= -1;
        if (nearest.ny !== 0) ball.vy *= -1;
      }

      if (this.onBrickHit) this.onBrickHit(nearestR, nearestC, destroyed, brick);
    }
  }

  // ---- Prevent near-horizontal ball (enforce minimum vy) ----
  _enforceMinVy(ball) {
    const minVy = ball.speed * C.MIN_VY_RATIO;
    if (Math.abs(ball.vy) < minVy) {
      ball.vy = (ball.vy < 0 ? -1 : ball.vy > 0 ? 1 : -1) * minVy;
      // Adjust vx to keep overall speed consistent
      const vxSq = ball.speed * ball.speed - ball.vy * ball.vy;
      if (vxSq > 0) {
        ball.vx = Math.sign(ball.vx || 1) * Math.sqrt(vxSq);
      }
    }
  }
}


// src/systems/score-system.js
// Provides: ScoreSystem
// Depends: C

class ScoreSystem {
  constructor() {
    this.score = 0;
    this._combo = 0;
    this._lastHit = -Infinity;
    this.comboTexts = [];  // floating combo text entries
  }

  /**
   * Called when a brick is hit.
   * @param {boolean} destroyed - true if the brick was destroyed
   */
  onBrickHit(destroyed) {
    if (!destroyed) return;

    const now = performance.now();

    // Combo: consecutive hits within the timeout window
    if (now - this._lastHit < C.COMBO_TIMEOUT) {
      this._combo++;
    } else {
      this._combo = 1;
    }
    this._lastHit = now;

    // Score with combo multiplier
    const mult = 1 + (this._combo - 1) * C.COMBO_MULT;
    const pts  = Math.round(C.BASE_SCORE * mult);
    this.score += pts;

    // Show floating combo text for combos >= 2
    if (this._combo >= 2) {
      this.comboTexts.push({
        text: `${this._combo}x Combo! +${pts}`,
        timer: 1.0,
      });
    }
  }

  /** Tick combo text timers and prune expired entries. */
  update(dt) {
    this.comboTexts = this.comboTexts.filter(t => {
      t.timer -= dt;
      return t.timer > 0;
    });
  }
}


// src/audio/audio-manager.js
// Provides: AudioManager, audio (global instance)
// Depends: (none)

class AudioManager {
  constructor() {
    this.ctx = null;              // AudioContext, created on first user interaction
    this.musicGain = null;        // GainNode for background music volume
    this.sfxGain = null;          // GainNode for sound effects volume
    this.musicEnabled = true;
    this.sfxEnabled = true;
    this._musicOscillators = [];  // Track active music oscillators for cleanup
    this._musicTimer = null;      // setInterval ID for music scheduling loop
    this._initialized = false;
  }

  // --------------------------------------------------------------------------
  // Initialization — must be called from a user gesture (click/tap/keypress)
  // to satisfy browser autoplay policies and unlock the AudioContext.
  // --------------------------------------------------------------------------
  init() {
    if (this._initialized) return;

    this.ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Master gain for background music — kept low so it doesn't overpower SFX
    this.musicGain = this.ctx.createGain();
    this.musicGain.gain.value = 0.15;
    this.musicGain.connect(this.ctx.destination);

    // Master gain for sound effects
    this.sfxGain = this.ctx.createGain();
    this.sfxGain.gain.value = 0.3;
    this.sfxGain.connect(this.ctx.destination);

    this._initialized = true;
  }

  // --------------------------------------------------------------------------
  // Toggle helpers — flip on/off and update gain immediately
  // --------------------------------------------------------------------------
  toggleMusic() {
    this.musicEnabled = !this.musicEnabled;
    if (this.musicGain) {
      this.musicGain.gain.value = this.musicEnabled ? 0.15 : 0;
    }
  }

  toggleSfx() {
    this.sfxEnabled = !this.sfxEnabled;
    if (this.sfxGain) {
      this.sfxGain.gain.value = this.sfxEnabled ? 0.3 : 0;
    }
  }

  // ==========================================================================
  //  SOUND EFFECTS — short procedural sounds for game events
  // ==========================================================================

  // --------------------------------------------------------------------------
  // Paddle hit — short metallic ping, triangle wave sweeping 800 → 400 Hz
  // --------------------------------------------------------------------------
  playPaddleHit() {
    if (!this._initialized || !this.sfxEnabled) return;

    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc.type = 'triangle';
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(400, t + 0.1);

    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);

    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t);
    osc.stop(t + 0.15);
  }

  // --------------------------------------------------------------------------
  // Brick hit (not destroyed) — low thud, square wave 200 → 100 Hz
  // --------------------------------------------------------------------------
  playBrickHit() {
    if (!this._initialized || !this.sfxEnabled) return;

    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc.type = 'square';
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.08);

    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);

    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t);
    osc.stop(t + 0.1);
  }

  // --------------------------------------------------------------------------
  // Brick destroyed — satisfying crunch/pop: white noise burst + descending tone
  // --------------------------------------------------------------------------
  playBrickDestroy() {
    if (!this._initialized || !this.sfxEnabled) return;

    const t = this.ctx.currentTime;

    // --- White noise burst with amplitude decay envelope ---
    const bufferSize = this.ctx.sampleRate * 0.1; // 100ms of noise
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      // Random noise shaped by a quadratic decay curve
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
    }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const noiseGain = this.ctx.createGain();
    noiseGain.gain.value = 0.15;
    noise.connect(noiseGain);
    noiseGain.connect(this.sfxGain);
    noise.start(t);

    // --- Descending sine tone 600 → 200 Hz ---
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.exponentialRampToValueAtTime(200, t + 0.15);

    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);

    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t);
    osc.stop(t + 0.2);
  }

  // --------------------------------------------------------------------------
  // Power-up collected — rising major chord arpeggio (C5 → E5 → G5)
  // --------------------------------------------------------------------------
  playPowerUp() {
    if (!this._initialized || !this.sfxEnabled) return;

    const t = this.ctx.currentTime;
    const notes = [523, 659, 784]; // C5, E5, G5

    notes.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const noteStart = t + i * 0.08;

      osc.type = 'sine';
      osc.frequency.value = freq;

      // Quick attack, then decay
      gain.gain.setValueAtTime(0, noteStart);
      gain.gain.linearRampToValueAtTime(0.2, noteStart + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, noteStart + 0.15);

      osc.connect(gain);
      gain.connect(this.sfxGain);
      osc.start(noteStart);
      osc.stop(noteStart + 0.15);
    });
  }

  // --------------------------------------------------------------------------
  // Life lost — sawtooth wave descending 400 → 100 Hz over half a second
  // --------------------------------------------------------------------------
  playLifeLost() {
    if (!this._initialized || !this.sfxEnabled) return;

    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.5);

    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);

    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t);
    osc.stop(t + 0.5);
  }

  // --------------------------------------------------------------------------
  // Win level — triumphant ascending fanfare (C5 → E5 → G5 → C6)
  // --------------------------------------------------------------------------
  playWin() {
    if (!this._initialized || !this.sfxEnabled) return;

    const t = this.ctx.currentTime;
    const melody = [523, 659, 784, 1047]; // C5, E5, G5, C6

    melody.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const noteStart = t + i * 0.12;

      osc.type = 'triangle';
      osc.frequency.value = freq;

      gain.gain.setValueAtTime(0, noteStart);
      gain.gain.linearRampToValueAtTime(0.25, noteStart + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, noteStart + 0.3);

      osc.connect(gain);
      gain.connect(this.sfxGain);
      osc.start(noteStart);
      osc.stop(noteStart + 0.3);
    });
  }

  // --------------------------------------------------------------------------
  // Game over — sad descending sequence (G4 → F4 → E4 → C4)
  // --------------------------------------------------------------------------
  playGameOver() {
    if (!this._initialized || !this.sfxEnabled) return;

    const t = this.ctx.currentTime;
    const melody = [392, 349, 330, 262]; // G4, F4, E4, C4

    melody.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const noteStart = t + i * 0.2;

      osc.type = 'triangle';
      osc.frequency.value = freq;

      gain.gain.setValueAtTime(0, noteStart);
      gain.gain.linearRampToValueAtTime(0.2, noteStart + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, noteStart + 0.4);

      osc.connect(gain);
      gain.connect(this.sfxGain);
      osc.start(noteStart);
      osc.stop(noteStart + 0.4);
    });
  }

  // --------------------------------------------------------------------------
  // Button click — short high-frequency tick
  // --------------------------------------------------------------------------
  playClick() {
    if (!this._initialized || !this.sfxEnabled) return;

    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc.type = 'sine';
    osc.frequency.value = 1000;

    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);

    osc.connect(gain);
    gain.connect(this.sfxGain);
    osc.start(t);
    osc.stop(t + 0.05);
  }

  // ==========================================================================
  //  BACKGROUND MUSIC — Procedural steampunk-mechanical loop
  // ==========================================================================
  //
  //  Structure: A repeating 2-bar pattern at 100 BPM consisting of:
  //    - Bass line:  sawtooth oscillators through a lowpass filter for a
  //                  warm, mechanical rumble (A2–D3–C3 progression)
  //    - Melody:     triangle-wave pentatonic phrases for a mysterious,
  //                  atmospheric feel
  //
  //  The scheduler pre-schedules notes in batches and uses setInterval
  //  to continuously feed the Web Audio timeline ahead of real time.
  // ==========================================================================

  startMusic() {
    // Background music removed by user preference — only SFX used
  }

  stopMusic() {
    // No-op — no background music
  }
}

// src/rendering/renderer.js
// Provides: Starfield, Renderer
// Depends: C, Theme, PowerUpType

// ---- Background Atmosphere: "Astral Dust" ----
// Celestial motes of gold and violet drifting through the void,
// layered with a vignette and subtle grid lines for depth.
class Starfield {
  constructor(screenW, screenH) {
    this.w = screenW;
    this.h = screenH;

    // Particle pool -- gold and violet celestial motes
    const colors = ['#e8b84a', '#d4623a', '#ffaa00', '#9070c0', '#ff8833', '#7a6830'];
    this._particles = [];
    for (let i = 0; i < 100; i++) {
      this._particles.push(this._spawnParticle(colors, true));
    }

    // Pre-render vignette
    this._vignette = document.createElement('canvas');
    this._vignette.width = screenW;
    this._vignette.height = screenH;
    const vCtx = this._vignette.getContext('2d');
    const cx = screenW / 2;
    const cy = screenH / 2;
    const outerR = Math.sqrt(cx * cx + cy * cy);
    const grad = vCtx.createRadialGradient(cx, cy, screenW * 0.25, cx, cy, outerR);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.6, 'rgba(0,0,0,0.2)');
    grad.addColorStop(1, 'rgba(0,0,0,0.7)');
    vCtx.fillStyle = grad;
    vCtx.fillRect(0, 0, screenW, screenH);

    // Pre-render subtle grid pattern
    this._gridOverlay = document.createElement('canvas');
    this._gridOverlay.width = screenW;
    this._gridOverlay.height = screenH;
    const gCtx = this._gridOverlay.getContext('2d');
    gCtx.strokeStyle = 'rgba(232,184,74,0.03)';
    gCtx.lineWidth = 0.5;
    const gridSize = 30;
    for (let x = 0; x < screenW; x += gridSize) {
      gCtx.beginPath();
      gCtx.moveTo(x, 0);
      gCtx.lineTo(x, screenH);
      gCtx.stroke();
    }
    for (let y = 0; y < screenH; y += gridSize) {
      gCtx.beginPath();
      gCtx.moveTo(0, y);
      gCtx.lineTo(screenW, y);
      gCtx.stroke();
    }
  }

  _spawnParticle(colors, randomY) {
    const isLarge = Math.random() < 0.15; // 15% chance of larger, slower mote
    return {
      x: Math.random() * this.w,
      y: randomY ? Math.random() * this.h : this.h + Math.random() * 20,
      vy: isLarge ? (3 + Math.random() * 6) : (6 + Math.random() * 14),
      sineAmp: 8 + Math.random() * 18,
      sineSpeed: 0.3 + Math.random() * 1.0,
      sineOffset: Math.random() * Math.PI * 2,
      size: isLarge ? (2 + Math.random() * 2) : (0.8 + Math.random() * 1.5),
      alpha: isLarge ? (0.5 + Math.random() * 0.4) : (0.2 + Math.random() * 0.5),
      color: colors[Math.floor(Math.random() * colors.length)],
      twinkleSpeed: 1 + Math.random() * 3,
    };
  }

  render(ctx, time, intensity = 1) {
    const colors = ['#e8b84a', '#d4623a', '#ffaa00', '#9070c0', '#ff8833', '#7a6830'];

    // Grid overlay (very subtle)
    ctx.globalAlpha = intensity * 0.5;
    ctx.drawImage(this._gridOverlay, 0, 0);
    ctx.globalAlpha = 1;

    // Particles with twinkle effect
    for (const p of this._particles) {
      p.y -= p.vy * 0.016;
      const swayX = Math.sin(time * p.sineSpeed + p.sineOffset) * p.sineAmp;
      if (p.y < -10) {
        Object.assign(p, this._spawnParticle(colors, false));
      }
      // Twinkle: modulate alpha with a sine wave
      const twinkle = Math.sin(time * p.twinkleSpeed + p.sineOffset) * 0.3 + 0.7;
      ctx.globalAlpha = p.alpha * intensity * twinkle;
      ctx.fillStyle = p.color;

      // Draw as a tiny diamond shape for larger motes, square for small
      if (p.size > 2) {
        ctx.save();
        ctx.translate(p.x + swayX, p.y);
        ctx.rotate(Math.PI / 4);
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();
      } else {
        ctx.fillRect(p.x + swayX - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
    }
    ctx.globalAlpha = 1;

    // Vignette
    ctx.globalAlpha = intensity;
    ctx.drawImage(this._vignette, 0, 0);
    ctx.globalAlpha = 1;
  }
}

// ---- Renderer ----
class Renderer {
  constructor(ctx, screenW, screenH) {
    this.ctx = ctx;
    this.w = screenW;
    this.h = screenH;
    this.starfield = new Starfield(screenW, screenH);
    this._brickCache = null;
    this._brickCacheDirty = true;
    this._time = 0;
  }

  invalidateBrickCache() { this._brickCacheDirty = true; }
  update(dt) { this._time += dt; }

  // ==========================================================
  //  Background
  // ==========================================================
  drawBackground(intensity = 0.3) {
    const ctx = this.ctx;

    // Multi-stop gradient for richer depth
    const grad = ctx.createLinearGradient(0, 0, 0, this.h);
    grad.addColorStop(0, Theme.bgGradTop);
    grad.addColorStop(0.4, Theme.bgGradBottom);
    grad.addColorStop(0.7, '#0e0c18');
    grad.addColorStop(1, '#100e1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, this.w, this.h);

    // Subtle radial warm glow at center-top (like a distant furnace)
    const glowGrad = ctx.createRadialGradient(
      this.w / 2, -50, 10,
      this.w / 2, -50, this.h * 0.6
    );
    glowGrad.addColorStop(0, 'rgba(232,184,74,0.06)');
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(0, 0, this.w, this.h);

    this.starfield.render(ctx, this._time, intensity);
  }

  // ==========================================================
  //  Decorative Ornaments
  // ==========================================================

  /**
   * Draw a horizontal ornamental divider line with a center diamond.
   */
  drawOrnament(y, width = 200) {
    const ctx = this.ctx;
    const cx = this.w / 2;
    const halfW = width / 2;

    // Gradient line
    ctx.save();
    const grad = ctx.createLinearGradient(cx - halfW, 0, cx + halfW, 0);
    grad.addColorStop(0, 'rgba(232,184,74,0)');
    grad.addColorStop(0.3, Theme.ornament.line);
    grad.addColorStop(0.5, Theme.ornament.lineBright);
    grad.addColorStop(0.7, Theme.ornament.line);
    grad.addColorStop(1, 'rgba(232,184,74,0)');

    ctx.strokeStyle = grad;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - halfW, y);
    ctx.lineTo(cx + halfW, y);
    ctx.stroke();

    // Center diamond
    ctx.fillStyle = Theme.ornament.dot;
    ctx.save();
    ctx.translate(cx, y);
    ctx.rotate(Math.PI / 4);
    ctx.fillRect(-3, -3, 6, 6);
    ctx.restore();

    // Side dots
    ctx.beginPath();
    ctx.arc(cx - halfW * 0.5, y, 1.5, 0, Math.PI * 2);
    ctx.arc(cx + halfW * 0.5, y, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  /**
   * Draw small decorative corner brackets around a rectangular area.
   */
  drawCornerBrackets(x, y, w, h, size = 8) {
    const ctx = this.ctx;
    ctx.strokeStyle = Theme.ornament.lineBright;
    ctx.lineWidth = 1;

    // Top-left
    ctx.beginPath();
    ctx.moveTo(x, y + size); ctx.lineTo(x, y); ctx.lineTo(x + size, y);
    ctx.stroke();

    // Top-right
    ctx.beginPath();
    ctx.moveTo(x + w - size, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + size);
    ctx.stroke();

    // Bottom-left
    ctx.beginPath();
    ctx.moveTo(x, y + h - size); ctx.lineTo(x, y + h); ctx.lineTo(x + size, y + h);
    ctx.stroke();

    // Bottom-right
    ctx.beginPath();
    ctx.moveTo(x + w - size, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - size);
    ctx.stroke();
  }

  // ==========================================================
  //  HUD
  // ==========================================================
  drawHUD(score, lives, levelName, activePowerUps) {
    const ctx = this.ctx;

    // Gradient HUD backdrop
    const hudGrad = ctx.createLinearGradient(0, 0, 0, C.PLAY_TOP);
    hudGrad.addColorStop(0, 'rgba(12, 10, 20, 0.85)');
    hudGrad.addColorStop(1, 'rgba(12, 10, 20, 0.5)');
    ctx.fillStyle = hudGrad;
    ctx.fillRect(0, 0, this.w, C.PLAY_TOP);

    // Thin gold line at the bottom of HUD
    ctx.strokeStyle = Theme.ornament.line;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, C.PLAY_TOP);
    ctx.lineTo(this.w, C.PLAY_TOP);
    ctx.stroke();

    // Score (left)
    ctx.font = '600 18px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.accent;
    ctx.textAlign = 'left';
    ctx.shadowColor = Theme.accent;
    ctx.shadowBlur = 6;
    ctx.fillText(score, 12, 30);
    ctx.shadowBlur = 0;

    // Score label
    ctx.font = '10px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText('SCORE', 12, 45);

    // Lives (right) - as dots instead of emoji
    ctx.textAlign = 'right';
    const dotRadius = 4;
    const dotGap = 12;
    const dotsStartX = this.w - 12;
    for (let i = 0; i < Math.min(lives, 9); i++) {
      const dx = dotsStartX - i * dotGap;
      ctx.fillStyle = Theme.powerUp.extraLife;
      ctx.shadowColor = Theme.powerUp.extraLife;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(dx, 28, dotRadius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Lives label
    ctx.font = '10px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText('LIVES', this.w - 12, 45);

    // Level name (centered)
    ctx.textAlign = 'center';
    ctx.font = '12px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText(levelName || '', this.w / 2, 28);

    // Pause hint
    ctx.font = '10px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textMuted;
    ctx.fillText('TAP TO PAUSE', this.w / 2, 45);

    // Active power-up indicators
    if (activePowerUps && activePowerUps.length > 0) {
      let px = 12;
      ctx.textAlign = 'left';
      for (const pu of activePowerUps) {
        const color = Theme.powerUp[pu.type] || '#fff';
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 4;
        ctx.font = '10px "Avenir Next", "Segoe UI", sans-serif';
        const label = this._powerUpLabel(pu.type);
        // Small pill background
        const text = `${label} ${Math.ceil(pu.timer)}s`;
        const tw = ctx.measureText(text).width + 8;
        ctx.globalAlpha = 0.2;
        ctx.beginPath();
        ctx.roundRect(px - 4, 58, tw, 16, 8);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillText(text, px, 70);
        px += tw + 6;
      }
      ctx.shadowBlur = 0;
    }
  }

  _powerUpLabel(type) {
    switch (type) {
      case 'fireball':    return '\u2022 FIRE';
      case 'widePaddle':  return '\u2022 WIDE';
      case 'split':       return '\u2022 SPLIT';
      case 'multiShot':   return '\u2022 BURST';
      default:            return '\u2022';
    }
  }

  // ==========================================================
  //  Paddle
  // ==========================================================
  drawPaddle(paddle) {
    const ctx = this.ctx;
    const b = paddle.getBounds();

    // Glow underneath
    ctx.shadowColor = Theme.accent;
    ctx.shadowBlur = paddle.isWide ? 20 : 12;

    // Multi-stop gradient
    const grad = ctx.createLinearGradient(b.left, b.top, b.right, b.top);
    grad.addColorStop(0, Theme.paddleGrad[1]);
    grad.addColorStop(0.3, Theme.paddleGrad[0]);
    grad.addColorStop(0.7, Theme.paddleGrad[0]);
    grad.addColorStop(1, Theme.paddleGrad[1]);

    const r = paddle.height / 2;
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(b.left, b.top, paddle.width, paddle.height, r);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Shine highlight (top edge)
    const shineGrad = ctx.createLinearGradient(b.left, b.top, b.right, b.top);
    shineGrad.addColorStop(0, 'rgba(255,255,255,0)');
    shineGrad.addColorStop(0.3, 'rgba(255,255,255,0.5)');
    shineGrad.addColorStop(0.7, 'rgba(255,255,255,0.5)');
    shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.strokeStyle = shineGrad;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(b.left + r, b.top + 1.5);
    ctx.lineTo(b.right - r, b.top + 1.5);
    ctx.stroke();

    // Center gem/indicator
    const gemX = paddle.x;
    const gemY = paddle.y;
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(gemX, gemY, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Side rivets
    ctx.fillStyle = Theme.paddleGrad[1];
    ctx.beginPath(); ctx.arc(b.left + 6, gemY, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(b.right - 6, gemY, 1.5, 0, Math.PI * 2); ctx.fill();
  }

  // ==========================================================
  //  Balls
  // ==========================================================
  drawBalls(balls) {
    const ctx = this.ctx;

    for (const ball of balls) {
      // Trail
      if (ball.trail.length > 1) {
        for (let i = 0; i < ball.trail.length; i++) {
          const t = ball.trail[i];
          const alpha = (i / ball.trail.length) * 0.3;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = ball.isFireball ? Theme.powerUp.fireball : Theme.ballGlow;
          ctx.beginPath();
          ctx.arc(t.x, t.y, ball.radius * (0.3 + 0.7 * (i / ball.trail.length)), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // Ball body
      ctx.shadowColor = ball.isFireball ? Theme.powerUp.fireballGlow : Theme.ballGlow;
      ctx.shadowBlur = ball.isFireball ? 22 : 12;

      if (ball.isFireball) {
        const grad = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.radius * 2);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.3, Theme.powerUp.fireballCore);
        grad.addColorStop(0.7, Theme.powerUp.fireballGlow);
        grad.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius * 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        const grad = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.radius);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.4, '#ffe8b0');
        grad.addColorStop(1, Theme.ballGlow);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.shadowBlur = 0;
    }
  }

  // ==========================================================
  //  Bricks
  // ==========================================================
  drawBricks(brickField) {
    const ctx = this.ctx;

    // ---- Brick cache: render all static bricks to an offscreen canvas ----
    // Bricks with active shakeTimer are drawn live on top of the cache.
    const hasShaking = this._hasShakingBricks(brickField);

    // Fast path: cache valid, no shaking bricks — just blit
    if (!this._brickCacheDirty && this._brickCache && !hasShaking) {
      ctx.drawImage(this._brickCache, 0, 0);
      return;
    }

    // Semi-fast path: cache valid but some bricks are shaking —
    // reuse cached layer, draw only shaking bricks live on top
    if (!this._brickCacheDirty && this._brickCache && hasShaking) {
      ctx.drawImage(this._brickCache, 0, 0);
      for (let r = 0; r < brickField.gridH; r++) {
        for (let c = 0; c < brickField.gridW; c++) {
          const brick = brickField.bricks[r][c];
          if (!brick || !brick.alive || brick.shakeTimer <= 0) continue;
          const rect = brickField.getBrickRect(r, c);
          const shakeX = (Math.random() - 0.5) * 4;
          const shakeY = (Math.random() - 0.5) * 4;
          this._drawSingleBrick(ctx, brick, rect, shakeX, shakeY);
        }
      }
      return;
    }

    // Slow path: rebuild the offscreen cache
    // Use logical dimensions (same as main canvas coordinate space).
    // The main canvas already handles DPR scaling, so the offscreen
    // canvas just needs to match the logical coordinate system.
    if (!this._brickCache || this._brickCache.width !== this.w || this._brickCache.height !== this.h) {
      this._brickCache = document.createElement('canvas');
      this._brickCache.width = this.w;
      this._brickCache.height = this.h;
    }

    const offCtx = this._brickCache.getContext('2d');
    offCtx.clearRect(0, 0, this.w, this.h);

    const shakingBricks = [];

    for (let r = 0; r < brickField.gridH; r++) {
      for (let c = 0; c < brickField.gridW; c++) {
        const brick = brickField.bricks[r][c];
        if (!brick || !brick.alive) continue;

        const rect = brickField.getBrickRect(r, c);

        // Defer shaking bricks to draw live on top
        if (brick.shakeTimer > 0) {
          shakingBricks.push({ brick, rect });
          continue;
        }

        this._drawSingleBrick(offCtx, brick, rect, 0, 0);
      }
    }

    this._brickCacheDirty = false;

    // Blit cached layer, then overlay shaking bricks
    ctx.drawImage(this._brickCache, 0, 0);

    for (const { brick, rect } of shakingBricks) {
      const shakeX = (Math.random() - 0.5) * 4;
      const shakeY = (Math.random() - 0.5) * 4;
      this._drawSingleBrick(ctx, brick, rect, shakeX, shakeY);
    }
  }

  _hasShakingBricks(brickField) {
    for (let r = 0; r < brickField.gridH; r++) {
      for (let c = 0; c < brickField.gridW; c++) {
        const brick = brickField.bricks[r][c];
        if (brick && brick.alive && brick.shakeTimer > 0) return true;
      }
    }
    return false;
  }

  _drawSingleBrick(ctx, brick, rect, shakeX, shakeY) {
    const x = rect.x + shakeX;
    const y = rect.y + shakeY;

    let colors;
    if (brick.color) {
      if (Array.isArray(brick.color)) {
        colors = brick.color;
      } else {
        colors = [brick.color, this._darken(brick.color, 30)];
      }
    } else if (brick.maxHp >= C.IRONCLAD_HP) {
      colors = Theme.brick.iron;
    } else {
      const hpKey = `hp${Math.min(brick.hp, 3)}`;
      colors = Theme.brick[hpKey] || Theme.brick.hp1;
    }

    // Pixel-art mode: flat fill for small bricks (high-density grids)
    if (rect.w < 6) {
      ctx.fillStyle = Array.isArray(colors) ? colors[0] : colors;
      ctx.fillRect(x, y, rect.w, rect.h);
      return;
    }

    // Gradient fill
    const grad = ctx.createLinearGradient(x, y, x, y + rect.h);
    grad.addColorStop(0, colors[0]);
    grad.addColorStop(1, colors[1]);

    const br = Math.min(3, rect.h / 3);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, rect.w, rect.h, br);
    ctx.fill();

    // Top gloss
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(x + 1, y + 1, rect.w - 2, rect.h * 0.3);

    // Bottom shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x + 1, y + rect.h * 0.7, rect.w - 2, rect.h * 0.3);

    // Iron brick bolts
    if (brick.maxHp >= C.IRONCLAD_HP) {
      ctx.fillStyle = 'rgba(160,140,180,0.3)';
      const boltR = 1.5, margin = 3;
      ctx.beginPath(); ctx.arc(x + margin, y + margin, boltR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + rect.w - margin, y + margin, boltR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + margin, y + rect.h - margin, boltR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + rect.w - margin, y + rect.h - margin, boltR, 0, Math.PI * 2); ctx.fill();
    }

    // Crack lines on damaged bricks
    if (brick.maxHp >= 2 && brick.maxHp < C.IRONCLAD_HP && brick.hp < brick.maxHp) {
      const damage = brick.maxHp - brick.hp;
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 1;
      if (damage >= 1) {
        ctx.beginPath();
        ctx.moveTo(x + rect.w * 0.4, y + 1);
        ctx.lineTo(x + rect.w * 0.5, y + rect.h * 0.4);
        ctx.lineTo(x + rect.w * 0.35, y + rect.h * 0.6);
        ctx.stroke();
      }
      if (damage >= 2) {
        ctx.beginPath();
        ctx.moveTo(x + rect.w - 1, y + rect.h * 0.3);
        ctx.lineTo(x + rect.w * 0.6, y + rect.h * 0.5);
        ctx.lineTo(x + rect.w * 0.7, y + rect.h * 0.8);
        ctx.stroke();
      }
    }
  }

  _darken(hex, amount) {
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.max(0, (num >> 16) - amount);
    const g = Math.max(0, ((num >> 8) & 0xff) - amount);
    const b = Math.max(0, (num & 0xff) - amount);
    return `rgb(${r},${g},${b})`;
  }

  // ==========================================================
  //  Power-Up Drops
  // ==========================================================
  drawPowerUps(drops) {
    const ctx = this.ctx;

    for (const drop of drops) {
      if (!drop.alive) continue;

      ctx.save();
      ctx.translate(drop.x, drop.y);
      ctx.rotate(drop.rotation);

      const color = Theme.powerUp[drop.type] || '#fff';

      // Outer ring glow
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, drop.radius + 2, 0, Math.PI * 2);
      ctx.stroke();

      // Filled center
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(0, 0, drop.radius, 0, Math.PI * 2);
      ctx.fill();

      // Inner icon
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#000';
      ctx.font = 'bold 11px "Avenir Next", "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this._powerUpIcon(drop.type), 0, 1);

      ctx.restore();
    }
  }

  _powerUpIcon(type) {
    switch (type) {
      case 'split':       return '\u00f7';
      case 'multiShot':   return '\u21d1';
      case 'fireball':    return '\u2605';
      case 'widePaddle':  return '\u2194';
      case 'extraLife':   return '+';
      default:            return '?';
    }
  }

  // ==========================================================
  //  Particles
  // ==========================================================
  drawParticles(particles) {
    const ctx = this.ctx;
    for (const p of particles) {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;

      // Draw as rotated diamond for more visual interest
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.PI / 4);
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // ==========================================================
  //  Combo Text
  // ==========================================================
  drawComboTexts(texts) {
    const ctx = this.ctx;
    ctx.textAlign = 'center';

    for (let i = 0; i < texts.length; i++) {
      const t = texts[i];
      const alpha = Math.min(1, t.timer * 2);
      const yOffset = (1 - t.timer) * 30;
      const scale = 1 + (1 - t.timer) * 0.2; // slight scale-up as it fades

      ctx.globalAlpha = alpha;
      ctx.save();
      ctx.translate(this.w / 2, this.h / 2 - 40 - yOffset - i * 25);
      ctx.scale(scale, scale);
      ctx.font = 'bold 16px "Avenir Next", "Segoe UI", sans-serif';
      ctx.shadowColor = Theme.accent;
      ctx.shadowBlur = 8;
      ctx.fillStyle = Theme.accent;
      ctx.fillText(t.text, 0, 0);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // ==========================================================
  //  UI Helpers
  // ==========================================================
  drawButton(x, y, w, h, text, options = {}) {
    const ctx = this.ctx;
    const {
      highlighted = false,
      color = Theme.button.bg,
      textColor = Theme.button.text,
      small = false,
    } = options;

    const baseColor = highlighted ? Theme.button.hover : color;

    // Outer glow on hover
    if (highlighted) {
      ctx.shadowColor = Theme.accent;
      ctx.shadowBlur = 12;
    }

    // Gradient body (with slight transparency for depth)
    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, this._lighten(baseColor, 15));
    grad.addColorStop(0.5, baseColor);
    grad.addColorStop(1, this._darken(baseColor, 15));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 10);
    ctx.fill();

    if (highlighted) ctx.shadowBlur = 0;

    // Border with gold accent
    ctx.strokeStyle = highlighted ? Theme.button.border : 'rgba(232,184,74,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Inner highlight line (top edge, softer)
    const innerGrad = ctx.createLinearGradient(x + 10, 0, x + w - 10, 0);
    innerGrad.addColorStop(0, 'rgba(255,255,255,0)');
    innerGrad.addColorStop(0.3, 'rgba(255,255,255,0.08)');
    innerGrad.addColorStop(0.7, 'rgba(255,255,255,0.08)');
    innerGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.strokeStyle = innerGrad;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x + 14, y + 2);
    ctx.lineTo(x + w - 14, y + 2);
    ctx.stroke();

    // Label
    ctx.fillStyle = textColor;
    ctx.font = small
      ? '14px "Avenir Next", "Segoe UI", sans-serif'
      : '600 15px "Avenir Next", "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Slight text shadow for readability
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 2;
    ctx.fillText(text, x + w / 2, y + h / 2);
    ctx.shadowBlur = 0;
    ctx.textBaseline = 'alphabetic';

    return { x, y, w, h };
  }

  _lighten(hex, amount) {
    if (hex.startsWith('rgba') || hex.startsWith('rgb')) return hex;
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.min(255, (num >> 16) + amount);
    const g = Math.min(255, ((num >> 8) & 0xff) + amount);
    const b = Math.min(255, (num & 0xff) + amount);
    return `rgb(${r},${g},${b})`;
  }

  drawTitle(text, y, size = 36) {
    const ctx = this.ctx;
    ctx.textAlign = 'center';

    // Title with layered glow
    ctx.font = `bold ${size}px "Avenir Next", "Georgia", serif`;

    // Outer glow
    ctx.shadowColor = Theme.accent;
    ctx.shadowBlur = 30;
    ctx.fillStyle = Theme.accent;
    ctx.fillText(text, this.w / 2, y);

    // Inner bright layer
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffe8b0';
    ctx.fillText(text, this.w / 2, y);

    ctx.shadowBlur = 0;
  }

  drawSubtitle(text, y, size = 14) {
    const ctx = this.ctx;
    ctx.textAlign = 'center';
    ctx.font = `${size}px "Avenir Next", "Segoe UI", sans-serif`;
    ctx.fillStyle = Theme.textSecondary;
    ctx.letterSpacing = '2px';
    ctx.fillText(text, this.w / 2, y);
    ctx.letterSpacing = '0px';
  }

  drawPulseSubtitle(text, y, size = 14) {
    const ctx = this.ctx;
    const alpha = Math.sin(this._time * 2.5) * 0.3 + 0.7;
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.font = `${size}px "Avenir Next", "Segoe UI", sans-serif`;
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText(text, this.w / 2, y);
    ctx.globalAlpha = 1;
  }

  drawOverlay(alpha = 0.7) {
    const ctx = this.ctx;
    ctx.fillStyle = `rgba(8, 6, 16, ${alpha})`;
    ctx.fillRect(0, 0, this.w, this.h);
  }
}


// src/scenes/state-machine.js
// Provides: STATES, TRANSITIONS, StateMachine
// Depends: (none)

const STATES = {
  MENU: 'MENU',
  LEVEL_SELECT: 'LEVEL_SELECT',
  PLAYING: 'PLAYING',
  PAUSED: 'PAUSED',
  WIN: 'WIN',
  LOSE: 'LOSE',
  IMAGE_UPLOAD: 'IMAGE_UPLOAD',
  CREATIVE: 'CREATIVE',
};

/** Allowed transitions from each state. */
const TRANSITIONS = {
  MENU:         ['LEVEL_SELECT', 'IMAGE_UPLOAD', 'CREATIVE'],
  LEVEL_SELECT: ['MENU', 'PLAYING', 'IMAGE_UPLOAD'],
  IMAGE_UPLOAD: ['LEVEL_SELECT', 'PLAYING', 'MENU'],
  PLAYING:      ['PAUSED', 'WIN', 'LOSE'],
  PAUSED:       ['PLAYING', 'MENU', 'LEVEL_SELECT'],
  WIN:          ['LEVEL_SELECT', 'MENU', 'PLAYING'],
  LOSE:         ['LEVEL_SELECT', 'MENU', 'PLAYING'],
  CREATIVE:     ['MENU', 'PLAYING'],
};

/**
 * Finite-state machine that governs scene transitions.
 * Only transitions listed in TRANSITIONS are permitted.
 */
class StateMachine {
  constructor() {
    this._state = STATES.MENU;
    this._scenes = {};
  }

  get state() { return this._state; }

  /** Register a scene handler for a given state. */
  registerScene(state, scene) {
    this._scenes[state] = scene;
  }

  /**
   * Attempt to transition to `newState`, optionally passing `data`
   * to the entering scene. Silently warns on invalid transitions.
   */
  transition(newState, data) {
    const allowed = TRANSITIONS[this._state];
    if (!allowed || !allowed.includes(newState)) {
      console.warn(`Invalid transition: ${this._state} → ${newState}`);
      return;
    }

    const oldState  = this._state;
    const oldScene  = this._scenes[oldState];
    const newScene  = this._scenes[newState];
    const isPause   = newState === STATES.PAUSED;
    const isResume  = oldState === STATES.PAUSED && newState === STATES.PLAYING;

    // Exit old scene (tell it whether we're just pausing)
    if (oldScene && typeof oldScene.exit === 'function') {
      oldScene.exit(isPause);
    }

    this._state = newState;

    // Enter new scene — skip re-enter when resuming from pause
    if (!isResume && newScene && typeof newScene.enter === 'function') {
      newScene.enter(data);
    }
  }

  /** Return the scene object for the current state. */
  getActiveScene() {
    return this._scenes[this._state] || null;
  }
}


// src/scenes/menu-scene.js
// Provides: MenuScene
// Depends: C, Theme, audio

class MenuScene {
  constructor(game) {
    this._game = game;
    this._buttons = [];
    this._floatingBalls = [];
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._enterTime = 0; // for staggered entrance animation
  }

  enter() {
    const cx = C.SCREEN_W / 2;
    this._buttons = [
      { x: cx - 110, y: 340, w: 220, h: 52, text: '\u2699  \u5173\u5361\u6a21\u5f0f', action: 'levels', delay: 0 },
      { x: cx - 110, y: 408, w: 220, h: 52, text: '\u25a3  \u56fe\u7247\u6a21\u5f0f', action: 'image', delay: 0.08 },
      { x: cx - 110, y: 476, w: 220, h: 52, text: '\u2726  \u521b\u9020\u6a21\u5f0f', action: 'creative', delay: 0.16 },
    ];

    this._sfxOn = (typeof audio !== 'undefined') ? audio.sfxEnabled : true;
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._enterTime = 0;

    this._floatingBalls = [];
    for (let i = 0; i < 6; i++) {
      this._floatingBalls.push({
        x: Math.random() * C.SCREEN_W,
        y: 130 + Math.random() * 140,
        vx: (Math.random() - 0.5) * 40,
        vy: (Math.random() - 0.5) * 40,
        radius: 2 + Math.random() * 3,
        alpha: 0.3 + Math.random() * 0.4,
      });
    }
  }

  exit() {}

  update(dt) {
    this._enterTime += dt;

    for (const b of this._floatingBalls) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      if (b.x < 0 || b.x > C.SCREEN_W) b.vx *= -1;
      if (b.y < 100 || b.y > 300) b.vy *= -1;
    }

    if (this._pressTimer > 0) {
      this._pressTimer -= dt;
      if (this._pressTimer <= 0) this._pressedBtn = null;
    }
  }

  render() {
    const r = this._game.renderer;
    const ctx = r.ctx;

    r.drawBackground(1.0);

    // Decorative floating balls with glow
    for (const b of this._floatingBalls) {
      ctx.globalAlpha = b.alpha * Math.min(1, this._enterTime / 1.0);
      ctx.fillStyle = Theme.accent;
      ctx.shadowColor = Theme.accent;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;

    // Title area with fade-in
    const titleAlpha = Math.min(1, this._enterTime / 0.6);
    ctx.globalAlpha = titleAlpha;

    // Main title
    r.drawTitle('\u9020\u7816\u5382', 200, 46);

    // Ornamental divider
    r.drawOrnament(230, 180);

    // Subtitle with letter spacing
    ctx.textAlign = 'center';
    ctx.font = '11px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText('B R E A K O U T   M A K E R', C.SCREEN_W / 2, 255);

    ctx.globalAlpha = 1;

    // Buttons with staggered entrance
    for (const btn of this._buttons) {
      const btnAge = this._enterTime - (btn.delay || 0);
      if (btnAge < 0) continue;

      const slideProgress = Math.min(1, btnAge / 0.3);
      const ease = 1 - Math.pow(1 - slideProgress, 3); // ease-out cubic
      const offsetY = (1 - ease) * 30;
      const alpha = ease;

      ctx.globalAlpha = alpha;
      const isPressed = this._pressedBtn === btn;
      r.drawButton(btn.x, btn.y + offsetY, btn.w, btn.h, btn.text, { highlighted: isPressed });
    }
    ctx.globalAlpha = 1;

    // Sound toggle (top-right, refined)
    const sfxBtnX = C.SCREEN_W - 52;
    const sfxBtnY = 10;
    const sfxBtnSize = 40;

    ctx.fillStyle = Theme.button.bg;
    ctx.beginPath();
    ctx.roundRect(sfxBtnX, sfxBtnY, sfxBtnSize, sfxBtnSize, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(232,184,74,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = this._sfxOn ? Theme.accent : Theme.textSecondary;
    ctx.fillText(this._sfxOn ? '\ud83d\udd0a' : '\ud83d\udd07', sfxBtnX + sfxBtnSize / 2, sfxBtnY + sfxBtnSize / 2);
    ctx.textBaseline = 'alphabetic';

    // Version/credit at very bottom
    ctx.textAlign = 'center';
    ctx.font = '9px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textMuted;
    ctx.fillText('v1.0 \u00b7 Powered by AI', C.SCREEN_W / 2, C.SCREEN_H - 20);
  }

  onTap(x, y) {
    const sfxBtnX = C.SCREEN_W - 52;
    const sfxBtnY = 10;
    const sfxBtnSize = 40;
    if (x >= sfxBtnX && x <= sfxBtnX + sfxBtnSize &&
        y >= sfxBtnY && y <= sfxBtnY + sfxBtnSize) {
      if (typeof audio !== 'undefined') {
        audio.init();
        audio.toggleSfx();
        this._sfxOn = audio.sfxEnabled;
      }
      return;
    }

    for (const btn of this._buttons) {
      if (x >= btn.x && x <= btn.x + btn.w &&
          y >= btn.y && y <= btn.y + btn.h) {
        this._pressedBtn = btn;
        this._pressTimer = 0.12;
        if (typeof audio !== 'undefined') { audio.init(); }
        if (typeof audio !== 'undefined') audio.playClick();

        if (btn.action === 'levels') {
          this._game.stateMachine.transition('LEVEL_SELECT');
        } else if (btn.action === 'image') {
          this._game.stateMachine.transition('IMAGE_UPLOAD');
        } else if (btn.action === 'creative') {
          this._game.stateMachine.transition('CREATIVE');
        }
      }
    }
  }

  onMove() {}
}


// src/scenes/level-select.js
// Provides: LevelSelectScene
// Depends: C, Theme, getPresetLevel, getTotalLevels

class LevelSelectScene {
  constructor(game) {
    this._game = game;
    this._page = 0;
    this._buttons = [];
    this._levelCards = [];
    this._pageText = '';
    this._unlockedLevels = 1;
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._enterTime = 0;
  }

  enter() {
    this._unlockedLevels = this._game.unlockedLevels || 1;
    this._pressedBtn = null;
    this._pressTimer = 0;
    this._enterTime = 0;
    this._buildPage();
  }

  exit() {}

  _buildPage() {
    const perPage    = 6;
    const total      = getTotalLevels();
    const totalPages = Math.ceil(total / perPage);
    const start      = this._page * perPage;

    this._levelCards = [];
    this._buttons    = [];

    // Level cards: 3 columns x 2 rows
    const cardW = 100, cardH = 125, gapX = 14, gapY = 16;
    const gridStartX = (C.SCREEN_W - 3 * cardW - 2 * gapX) / 2;
    const gridStartY = 110;

    for (let i = 0; i < perPage; i++) {
      const levelIdx = start + i;
      if (levelIdx >= total) break;

      const col = i % 3;
      const row = Math.floor(i / 3);
      const x   = gridStartX + col * (cardW + gapX);
      const y   = gridStartY + row * (cardH + gapY);
      const level    = getPresetLevel(levelIdx);
      const unlocked = true;

      this._levelCards.push({ x, y, w: cardW, h: cardH, levelIdx, level, unlocked, animDelay: i * 0.05 });
    }

    // Pagination
    const btnY = 390;
    if (this._page > 0) {
      this._buttons.push({
        x: 20, y: btnY, w: 100, h: 48,
        text: '\u2190 \u4e0a\u4e00\u9875', action: 'prevPage',
      });
    }
    if (this._page < totalPages - 1) {
      this._buttons.push({
        x: C.SCREEN_W - 120, y: btnY, w: 100, h: 48,
        text: '\u4e0b\u4e00\u9875 \u2192', action: 'nextPage',
      });
    }

    this._pageText = `${this._page + 1} / ${totalPages}`;

    this._buttons.push({
      x: C.SCREEN_W / 2 - 70, y: 530, w: 140, h: 48,
      text: '\u8fd4\u56de', action: 'back',
    });
  }

  update(dt) {
    this._enterTime += dt;
    if (this._pressTimer > 0) {
      this._pressTimer -= dt;
      if (this._pressTimer <= 0) this._pressedBtn = null;
    }
  }

  render() {
    const r   = this._game.renderer;
    const ctx = r.ctx;

    r.drawBackground();

    // Title
    r.drawTitle('\u9009\u62e9\u5173\u5361', 58, 26);
    r.drawOrnament(75, 140);

    // Level cards with staggered entrance
    for (const card of this._levelCards) {
      const cardAge = this._enterTime - (card.animDelay || 0);
      if (cardAge < 0) continue;

      const slideProgress = Math.min(1, cardAge / 0.25);
      const ease = 1 - Math.pow(1 - slideProgress, 3);
      const scale = 0.9 + ease * 0.1;
      const alpha = ease;

      ctx.globalAlpha = alpha;
      ctx.save();

      const isLocked = !card.unlocked;

      // Card background with subtle inner glow
      const cardGrad = ctx.createLinearGradient(card.x, card.y, card.x, card.y + card.h);
      if (isLocked) {
        cardGrad.addColorStop(0, 'rgba(12,10,20,0.5)');
        cardGrad.addColorStop(1, 'rgba(12,10,20,0.7)');
      } else {
        cardGrad.addColorStop(0, 'rgba(30,26,48,0.8)');
        cardGrad.addColorStop(1, 'rgba(18,16,30,0.9)');
      }
      ctx.fillStyle = cardGrad;
      ctx.beginPath();
      ctx.roundRect(card.x, card.y, card.w, card.h, 10);
      ctx.fill();

      // Border
      ctx.strokeStyle = isLocked ? Theme.card.borderLocked : 'rgba(232,184,74,0.35)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Corner brackets on unlocked cards
      if (!isLocked) {
        r.drawCornerBrackets(card.x + 3, card.y + 3, card.w - 6, card.h - 6, 6);
      }

      // Level number
      ctx.font = 'bold 24px "Avenir Next", "Georgia", serif';
      ctx.fillStyle = isLocked ? Theme.card.textLocked : Theme.accent;
      ctx.textAlign = 'center';
      ctx.shadowColor = isLocked ? 'transparent' : Theme.accent;
      ctx.shadowBlur = isLocked ? 0 : 6;
      ctx.fillText(card.levelIdx + 1, card.x + card.w / 2, card.y + 32);
      ctx.shadowBlur = 0;

      // Level name
      ctx.font = '9px "Avenir Next", "Segoe UI", sans-serif';
      ctx.fillStyle = isLocked ? Theme.card.textLocked : Theme.textSecondary;
      ctx.fillText(
        card.level.name.split(' - ')[1] || '',
        card.x + card.w / 2,
        card.y + 48,
      );

      if (!isLocked) {
        // Mini brick preview
        const previewW = card.w - 16;
        const previewH = 44;
        const previewX = card.x + 8;
        const previewY = card.y + 58;

        // Preview border
        ctx.strokeStyle = 'rgba(232,184,74,0.1)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(previewX, previewY, previewW, previewH);

        const dotW = previewW / card.level.gridWidth;
        const dotH = previewH / card.level.gridHeight;

        for (const b of card.level.bricks) {
          const bx = previewX + b.col * dotW;
          const by = previewY + b.row * dotH;

          let bColor;
          if (b.hp >= C.IRONCLAD_HP || b.hp >= 999) {
            bColor = Theme.brick.iron[0];
          } else if (b.color && Array.isArray(b.color)) {
            bColor = b.color[0];
          } else {
            const hpColors = [Theme.brick.hp1[0], Theme.brick.hp2[0], Theme.brick.hp3[0]];
            bColor = hpColors[Math.min(b.hp - 1, 2)] || hpColors[0];
          }
          ctx.fillStyle = bColor;
          ctx.fillRect(bx, by, Math.max(1, dotW - 0.5), Math.max(1, dotH - 0.5));
        }

        // Brick count badge
        ctx.font = '8px "Avenir Next", "Segoe UI", sans-serif';
        ctx.fillStyle = Theme.textMuted;
        ctx.fillText(card.level.bricks.length + '\u2009\u7816', card.x + card.w / 2, card.y + card.h - 10);
      } else {
        ctx.font = '28px sans-serif';
        ctx.fillStyle = Theme.card.textLocked;
        ctx.fillText('\ud83d\udd12', card.x + card.w / 2, card.y + 90);
      }

      ctx.restore();
    }
    ctx.globalAlpha = 1;

    // Page indicator with decorative dots
    ctx.textAlign = 'center';
    ctx.font = '13px "Avenir Next", "Segoe UI", sans-serif';
    ctx.fillStyle = Theme.textSecondary;
    ctx.fillText(this._pageText, C.SCREEN_W / 2, 430);

    // Buttons
    for (const btn of this._buttons) {
      const isPressed = this._pressedBtn === btn;
      r.drawButton(btn.x, btn.y, btn.w, btn.h, btn.text, { highlighted: isPressed });
    }
  }

  onTap(x, y) {
    for (const card of this._levelCards) {
      if (card.unlocked &&
          x >= card.x && x <= card.x + card.w &&
          y >= card.y && y <= card.y + card.h) {
        this._game.stateMachine.transition('PLAYING', {
          level: card.level,
          levelIndex: card.levelIdx,
        });
        return;
      }
    }

    for (const btn of this._buttons) {
      if (x >= btn.x && x <= btn.x + btn.w &&
          y >= btn.y && y <= btn.y + btn.h) {
        this._pressedBtn = btn;
        this._pressTimer = 0.12;
        switch (btn.action) {
          case 'prevPage':
            this._page--;
            this._enterTime = 0;
            this._buildPage();
            break;
          case 'nextPage':
            this._page++;
            this._enterTime = 0;
            this._buildPage();
            break;
          case 'back':
            this._game.stateMachine.transition('MENU');
            break;
        }
      }
    }
  }

  onMove() {}
}


// src/scenes/game-scene.js
// Provides: GameScene
// Depends: C, Theme, PowerUpType, Ball, Paddle, BrickField, PhysicsWorld,
//          ScoreSystem, Particle, rollPowerUpDrop, audio, Renderer

/**
 * Core gameplay scene managing multi-ball, power-ups, particles,
 * physics, scoring, and deferred state transitions.
 */
class GameScene {
  constructor(game) {
    this._game = game;

    // Runtime game objects
    this.balls        = [];
    this.paddle       = null;
    this.brickField   = null;
    this.physics      = null;
    this.scoreSystem  = null;
    this.powerUpDrops = [];
    this.activePowerUps = [];
    this.particles    = [];

    // Level metadata
    this.level      = null;
    this.levelIndex = 0;
    this.lives      = C.DEFAULT_LIVES;

    // Internal flags
    this._pendingTransition = null;
    this._launched = false;
  }

  // ---- Lifecycle ----

  enter(data) {
    if (!data || !data.level) return;

    this.level      = data.level;
    this.levelIndex = data.levelIndex || 0;
    this.lives      = data.level.lives || C.DEFAULT_LIVES;

    this._pendingTransition = null;
    this._launched          = false;
    this.powerUpDrops       = [];

    // Invalidate brick cache so the new level's bricks are rendered fresh
    this._game.renderer.invalidateBrickCache();
    this.activePowerUps     = [];
    this.particles          = [];

    // Paddle
    const pw   = data.level.paddleWidth || 120;
    this.paddle = new Paddle(
      C.SCREEN_W / 2,
      C.SCREEN_H - C.PLAY_BOTTOM_MARGIN,
      pw,
    );

    // Brick field
    this.brickField = new BrickField(data.level, C.SCREEN_W);

    // Initial ball sitting on the paddle
    this.balls = [];
    this._spawnBallOnPaddle();

    // Score tracking
    this.scoreSystem = new ScoreSystem();

    // Physics engine
    this.physics = new PhysicsWorld(
      this.brickField, this.paddle,
      C.SCREEN_W, C.SCREEN_H,
    );

    // --- Physics callbacks ---

    this.physics.onBrickHit = (row, col, destroyed, brick) => {
      this.scoreSystem.onBrickHit(destroyed);

      // Sound effects
      if (typeof audio !== 'undefined') {
        if (destroyed) audio.playBrickDestroy();
        else audio.playBrickHit();
      }

      if (destroyed) {
        // Burst particles at the brick center
        const rect  = this.brickField.getBrickRect(row, col);
        const rawColor = brick.color
          || Theme.brick[`hp${Math.min(brick.maxHp, 4)}`]
          || ['#fff', '#ccc'];
        const color = Array.isArray(rawColor) ? rawColor[0] : rawColor;
        for (let i = 0; i < 8; i++) {
          this.particles.push(
            new Particle(rect.x + rect.w / 2, rect.y + rect.h / 2, color),
          );
        }

        // Maybe drop a power-up
        const drop = rollPowerUpDrop(rect.x + rect.w / 2, rect.y + rect.h / 2);
        if (drop) this.powerUpDrops.push(drop);
      }

      // Invalidate the cached brick layer so Renderer redraws
      this._game.renderer.invalidateBrickCache();

      // Check win condition
      if (this.brickField.isCleared() && !this._pendingTransition) {
        this._pendingTransition = {
          state: 'WIN',
          data: {
            score: this.scoreSystem.score,
            level: this.level,
            levelIndex: this.levelIndex,
          },
        };
      }
    };

    this.physics.onBallLost = (ball) => {
      ball._dead = true;
    };

    this.physics.onPaddleHit = (_ball) => {
      if (typeof audio !== 'undefined') audio.playPaddleHit();
    };
  }

  /** Place a new ball on top of the paddle (pre-launch). */
  _spawnBallOnPaddle() {
    const ball = new Ball(
      this.paddle.x,
      this.paddle.y - this.paddle.height / 2 - C.BALL_RADIUS - 2,
    );
    ball.speed = this.level.ballSpeed || C.BALL_SPEED;
    this.balls.push(ball);
    this._launched = false;
  }

  exit(preserveState) {
    if (!preserveState) {
      this.balls        = [];
      this.paddle       = null;
      this.brickField   = null;
      this.physics      = null;
      this.powerUpDrops = [];
      this.activePowerUps = [];
      this.particles    = [];
    }
  }

  // ---- Frame update ----

  update(dt) {
    // Guard: nothing to update if not entered
    if (!this.paddle || !this.brickField) return;

    // Pre-launch: ball tracks paddle position
    if (!this._launched) {
      if (this.balls.length > 0) {
        this.balls[0].x = this.paddle.x;
        this.balls[0].y = this.paddle.y - this.paddle.height / 2 - C.BALL_RADIUS - 2;
      }
      this.paddle.update(dt);
      return;
    }

    this.paddle.update(dt);
    this.brickField.update(dt);
    this.scoreSystem.update(dt);

    // Run physics tick (handles ball-wall, ball-paddle, ball-brick)
    this.physics.tick(this.balls, dt);

    // Remove dead balls (fell off bottom)
    this.balls = this.balls.filter(b => !b._dead);

    // If every ball is gone, lose a life
    if (this.balls.length === 0) {
      this.lives--;
      if (typeof audio !== 'undefined') audio.playLifeLost();
      if (this.lives <= 0 && !this._pendingTransition) {
        this._pendingTransition = {
          state: 'LOSE',
          data: {
            score: this.scoreSystem.score,
            level: this.level,
            levelIndex: this.levelIndex,
          },
        };
      } else if (this.lives > 0) {
        this._spawnBallOnPaddle();
      }
    }

    // --- Power-up drops: fall & check paddle catch ---
    for (const drop of this.powerUpDrops) {
      drop.update(dt);
      if (drop.alive) {
        const pb = this.paddle.getBounds();
        if (drop.x >= pb.left && drop.x <= pb.right &&
            drop.y + drop.radius >= pb.top &&
            drop.y - drop.radius <= pb.bottom) {
          drop.alive = false;
          this._activatePowerUp(drop.type);
          if (typeof audio !== 'undefined') audio.playPowerUp();
        }
      }
    }
    this.powerUpDrops = this.powerUpDrops.filter(d => d.alive);

    // --- Tick active timed power-ups ---
    this.activePowerUps = this.activePowerUps.filter(pu => {
      pu.timer -= dt;
      return pu.timer > 0;
    });

    // --- Particles ---
    for (const p of this.particles) p.update(dt);
    this.particles = this.particles.filter(p => !p.dead);

    // --- Deferred state transition (win / lose) ---
    if (this._pendingTransition) {
      const { state, data } = this._pendingTransition;
      this._pendingTransition = null;
      this._game.stateMachine.transition(state, data);
    }
  }

  // ---- Power-up activation ----

  _activatePowerUp(type) {
    switch (type) {

      case PowerUpType.SPLIT: {
        // Every existing ball spawns two extra at ±0.4 rad offset
        const newBalls = [];
        for (const ball of this.balls) {
          const baseAngle = Math.atan2(ball.vy, ball.vx);

          for (const offset of [-0.4, 0.4]) {
            const angle = baseAngle + offset;
            const b = new Ball(ball.x, ball.y, ball.radius);
            b.speed = ball.speed;
            b.vx    = ball.speed * Math.cos(angle);
            b.vy    = ball.speed * Math.sin(angle);
            b.isFireball   = ball.isFireball;
            b.fireballTimer = ball.fireballTimer;
            newBalls.push(b);
          }
        }
        this.balls.push(...newBalls);
        break;
      }

      case PowerUpType.MULTI_SHOT: {
        // Fire 3 new balls from the paddle in a fan
        for (let i = -1; i <= 1; i++) {
          const b = new Ball(
            this.paddle.x + i * 15,
            this.paddle.y - this.paddle.height / 2 - C.BALL_RADIUS - 2,
          );
          b.speed = this.level.ballSpeed || C.BALL_SPEED;
          b.launch(C.LAUNCH_ANGLE + i * 0.3);
          this.balls.push(b);
        }
        break;
      }

      case PowerUpType.FIREBALL: {
        // All current balls become fireballs for 8 s
        for (const ball of this.balls) {
          ball.isFireball   = true;
          ball.fireballTimer = 8;
        }
        this.activePowerUps.push({ type: PowerUpType.FIREBALL, timer: 8 });
        break;
      }

      case PowerUpType.WIDE_PADDLE: {
        this.paddle.setWide(10);
        this.activePowerUps.push({ type: PowerUpType.WIDE_PADDLE, timer: 10 });
        break;
      }

      case PowerUpType.EXTRA_LIFE: {
        this.lives = Math.min(this.lives + 1, 9);
        break;
      }
    }
  }

  // ---- Rendering ----

  render() {
    const r = this._game.renderer;
    r.drawBackground();
