# ==============================================================================
# Docker Compose for Breakout Maker (造砖厂)
# ==============================================================================
# Usage:
#   cp .env.example .env   # 填入你的 API key
#   docker compose up -d   # 启动
#   docker compose logs -f # 查看日志
# ==============================================================================

services:
  app:
    build: .
    container_name: breakout-maker
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: breakout-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy

  # Optional: auto-renew SSL certs
  certbot:
    image: certbot/certbot
    container_name: breakout-certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
